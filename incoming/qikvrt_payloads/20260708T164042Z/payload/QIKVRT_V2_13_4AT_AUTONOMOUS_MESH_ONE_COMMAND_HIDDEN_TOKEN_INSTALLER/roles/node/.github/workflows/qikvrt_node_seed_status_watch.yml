name: QIKVRT Node Seed Status Watch

on:
  workflow_dispatch:
  schedule:
    - cron: '47 */6 * * *'

permissions:
  contents: write

defaults:
  run:
    shell: sh

jobs:
  node-seed-status-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout node repository
        uses: actions/checkout@v4
      - name: Run node seed status watch
        run: sh tools/qikvrt_node_seed_status_watch.sh
      - name: Persist node seed status outputs
        run: |
          git config user.name "qikvrt-actions"
          git config user.email "qikvrt-actions@users.noreply.github.com"
          git add qikvrt/runtime/onboarding evidence || true
          if git diff --cached --quiet; then
            echo "QIKVRT_NODE_SEED_STATUS_COMMIT no_changes"
          else
            git commit -m "QIKVRT autonomous node ack of seed acceptance"
            git push
          fi
