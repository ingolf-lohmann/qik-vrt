name: QIKVRT Node Health Publish

on:
  workflow_dispatch:
  schedule:
    - cron: '7 */6 * * *'

permissions:
  contents: write

defaults:
  run:
    shell: sh

jobs:
  node-health-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout node repository
        uses: actions/checkout@v4
      - name: Publish node heartbeat
        run: sh tools/qikvrt_node_health_publish.sh
      - name: Persist node health outputs
        run: |
          git config user.name "qikvrt-actions"
          git config user.email "qikvrt-actions@users.noreply.github.com"
          git add qikvrt/runtime/onboarding evidence || true
          if git diff --cached --quiet; then
            echo "QIKVRT_NODE_HEALTH_COMMIT no_changes"
          else
            git commit -m "QIKVRT autonomous node health heartbeat"
            git push
          fi
