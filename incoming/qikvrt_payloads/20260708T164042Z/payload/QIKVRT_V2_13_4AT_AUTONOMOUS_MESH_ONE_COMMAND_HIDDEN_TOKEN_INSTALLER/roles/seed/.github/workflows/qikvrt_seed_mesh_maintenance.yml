name: QIKVRT Seed Mesh Maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: '37 */6 * * *'

permissions:
  contents: write

defaults:
  run:
    shell: sh

jobs:
  seed-mesh-maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout seed repository
        uses: actions/checkout@v4
      - name: Run autonomous seed mesh maintenance
        run: sh tools/qikvrt_seed_mesh_maintenance.sh
      - name: Persist seed mesh maintenance outputs
        run: |
          git config user.name "qikvrt-actions"
          git config user.email "qikvrt-actions@users.noreply.github.com"
          git add registry evidence || true
          if git diff --cached --quiet; then
            echo "QIKVRT_SEED_MESH_MAINTENANCE_COMMIT no_changes"
          else
            git commit -m "QIKVRT autonomous seed mesh maintenance"
            git push
          fi
