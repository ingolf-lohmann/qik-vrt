name: QIKVRT Node Seed Status Watch
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: QIKVRT run id
        required: false
        type: string
  schedule:
    - cron: '47 */6 * * *'
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      QIKVRT_RUN_ID: ${{ inputs.run_id || github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Run QIKVRT Node Seed Status Watch
        run: sh tools/qikvrt_node_seed_status_watch.sh
      - name: Commit QIKVRT outputs
        shell: sh
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add qikvrt/runtime/onboarding evidence || true
          if git diff --cached --quiet; then
            echo "QIKVRT_NO_CHANGES"
            exit 0
          fi
          git commit -m "QIKVRT 4AU1 Node Output $QIKVRT_RUN_ID"
          branch="${GITHUB_REF_NAME:-main}"
          n=1
          while [ "$n" -le 5 ]; do
            echo "QIKVRT_PUSH_ATTEMPT $n branch=$branch"
            if git pull --rebase --autostash origin "$branch" && git push origin "HEAD:$branch"; then
              echo "QIKVRT_PUSH_PASS attempt=$n"
              exit 0
            fi
            n=$((n+1))
            sleep 5
          done
          echo "BLOCK QIKVRT_PUSH_FAILED_AFTER_RETRY"
          exit 44
