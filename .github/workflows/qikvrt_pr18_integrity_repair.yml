name: QIKVRT PR18 integrity repair

on:
  push:
    branches:
      - infra/live-status-default-branch
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: qikvrt-pr18-integrity-repair
  cancel-in-progress: false

jobs:
  repair:
    if: github.event_name != 'pull_request' || github.head_ref == 'infra/live-status-default-branch'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: infra/live-status-default-branch
          fetch-depth: 0
      - name: Regenerate and verify repository integrity
        run: |
          set -euo pipefail
          python3 tools/qikvrt_integrity.py generate
          python3 tools/qikvrt_integrity.py verify
      - name: Commit regenerated integrity outputs
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add REPOSITORY_FILE_MANIFEST.json REPOSITORY_FILE_MANIFEST.json.sha256 SHA256SUMS.txt
          if git diff --cached --quiet; then
            echo "Integrity outputs already current."
            exit 0
          fi
          git commit -m "fix: regenerate repository integrity for live status watcher"
          git push origin HEAD:infra/live-status-default-branch
