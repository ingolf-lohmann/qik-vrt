name: qikvrt-v12-verify
on:
  workflow_dispatch:
  push:
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Master acceptance gate
        run: python tools/qikvrt_master_acceptance_gate.py
      - name: CI/CD dry run
        run: python tools/qikvrt_cicd_publish.py --mode dry-run --no-interactive
