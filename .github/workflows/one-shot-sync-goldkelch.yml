name: One-shot synchronize with Goldkelch release

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-sync-goldkelch.yml

permissions:
  contents: write

concurrency:
  group: one-shot-sync-goldkelch-main
  cancel-in-progress: false

jobs:
  synchronize:
    if: github.repository == 'ingolf-lohmann/qik-vrt'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out target repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify source and synchronize non-workflow tree
        shell: bash
        env:
          SOURCE_COMMIT: a8a9cb2666a91411489d4fc90a5306908f8428ea
          SOURCE_TREE: c5cefebd20b5836d730a4e9da82eeaa5c9363ebf
          SOURCE_TAG: v2026.07.20-wirkungshaltepunkt-evolution
        run: |
          set -euo pipefail

          test "$GITHUB_REF" = "refs/heads/main"
          target_head="$(git rev-parse HEAD)"

          git remote add goldkelch https://github.com/Goldkelch/qik-vrt.git
          git fetch --no-tags --depth=1 goldkelch "$SOURCE_COMMIT"
          test "$(git rev-parse FETCH_HEAD)" = "$SOURCE_COMMIT"
          test "$(git rev-parse FETCH_HEAD^{tree})" = "$SOURCE_TREE"

          git read-tree "$SOURCE_TREE"
          git restore --source="$target_head" --staged -- .github/workflows
          sync_tree="$(git write-tree)"

          git diff --quiet "$target_head" "$sync_tree" -- .github/workflows
          git diff --quiet "$SOURCE_TREE" "$sync_tree" -- . ':(exclude).github/workflows/**'

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          sync_commit="$(git commit-tree "$sync_tree" -p "$target_head" -m "Synchronize non-workflow tree with Goldkelch/qik-vrt" -m "Source commit: $SOURCE_COMMIT" -m "Source tree: $SOURCE_TREE" -m "Release tag: $SOURCE_TAG" -m "The workflow subtree is intentionally finalized by the authorized GitHub App in the following fast-forward commit.")"

          test "$(git rev-parse "$sync_commit^{tree}")" = "$sync_tree"
          test "$(git rev-parse "$sync_commit^")" = "$target_head"

          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "$target_head"
          git push origin "$sync_commit:refs/heads/main"
