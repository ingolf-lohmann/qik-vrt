name: QIK-VRT formalization v2 read-only deposition inventory

on:
  push:
    branches:
      - automation/formalization-v2-inventory-20260723
    paths:
      - release/formalization-v2-inventory-request.json

permissions:
  contents: read

concurrency:
  group: qikvrt-formalization-v2-inventory-${{ github.repository }}
  cancel-in-progress: false

jobs:
  inspect:
    if: github.repository == 'Goldkelch/qik-vrt'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the three-commit read-only inspection chain
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 3
          persist-credentials: false

      - name: Validate the marker-only read-only request
        id: marker
        env:
          GH_API_TOKEN: ${{ github.token }}
          EVENT_AFTER: ${{ github.event.after }}
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_FORCED: ${{ github.event.forced }}
          EVENT_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          python -I -S -B - <<'PY'
          import hashlib
          import json
          import os
          import re
          import subprocess
          import urllib.parse
          import urllib.request
          from pathlib import Path

          MARKER = "release/formalization-v2-inventory-request.json"
          WORKFLOW = ".github/workflows/qikvrt_formalization_v2_inventory.yml"
          REF = "refs/heads/automation/formalization-v2-inventory-20260723"
          AUTHORITY = "Goldkelch/qik-vrt"
          MIRROR = "ingolf-lohmann/qik-vrt"
          FEATURE = "agent/manuscript-formalization-v2-alpha"
          AUTHORITY_COMMIT = "af6762da33e19f3a1525b3a726eabc70994542b0"
          MIRROR_COMMIT = "6d6d1866779f1d907b8a33d1515f951d7cbd2a81"
          CANDIDATE_TREE = "6d14ac019cde5be15ea12fd6993e015efd041d26"
          ZERO40 = "0" * 40
          ZERO64 = "0" * 64
          SHA1 = re.compile(r"[0-9a-f]{40}\Z")
          SHA256 = re.compile(r"[0-9a-f]{64}\Z")
          PATHS = {
              "effect_ack_sha256": "formalization/QIKVRT_Formalization_v2.0/release_authorization/EFFECT_ACK_DONE.json",
              "manifest_sha256": "release/formalization-v2-zenodo.json",
              "workflow_sha256": WORKFLOW,
          }

          def fail(message):
              raise SystemExit("BLOCK: " + message)

          def git(*arguments):
              return subprocess.check_output(
                  ["git", *arguments], text=True, stderr=subprocess.DEVNULL
              ).strip()

          def shape(value, where):
              if not isinstance(value, dict) or set(value) != {
                  "schema", "request_id", "state", "confirm",
                  "diagnostic_parent_commit", "authority_commit",
                  "mirror_commit", "candidate_tree", "bindings",
              }:
                  fail(where + " keys differ")
              if value["schema"] != "qikvrt_formalization_v2_draft_inventory_request_v1":
                  fail(where + " schema differs")
              if value["request_id"] != "2026-07-23-formalization-v2.0-alpha.1-draft-inventory":
                  fail(where + " request identity differs")
              if not all(
                  isinstance(value[key], str) and SHA1.fullmatch(value[key])
                  for key in ("diagnostic_parent_commit", "authority_commit", "mirror_commit", "candidate_tree")
              ):
                  fail(where + " commit/tree identity is malformed")
              if not isinstance(value["bindings"], dict) or set(value["bindings"]) != set(PATHS):
                  fail(where + " binding keys differ")
              if not all(isinstance(item, str) and SHA256.fullmatch(item) for item in value["bindings"].values()):
                  fail(where + " binding digest is malformed")

          def api(repository, suffix, token):
              headers = {
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "qikvrt-formalization-v2-inventory-gate",
              }
              if token:
                  headers["Authorization"] = "Bearer " + token
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}/{suffix}", headers=headers
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  value = json.load(response)
              if not isinstance(value, dict):
                  fail("GitHub API returned a non-object")
              return value

          def remote(repository, token):
              ref = api(
                  repository,
                  "git/ref/heads/" + urllib.parse.quote(FEATURE, safe="/"),
                  token,
              )
              obj = ref.get("object")
              sha = obj.get("sha") if isinstance(obj, dict) else None
              if not isinstance(sha, str) or SHA1.fullmatch(sha) is None:
                  fail(repository + " feature ref is malformed")
              commit = api(repository, "git/commits/" + sha, token)
              tree = commit.get("tree")
              tree_sha = tree.get("sha") if isinstance(tree, dict) else None
              return sha, tree_sha

          if (
              os.environ["GITHUB_REPOSITORY"] != AUTHORITY
              or os.environ["EVENT_REF"] != REF
              or os.environ["EVENT_FORCED"] != "false"
              or os.environ["EVENT_AFTER"] != os.environ["GITHUB_SHA"]
          ):
              fail("inspection event envelope differs")
          value = json.loads(Path(MARKER).read_text(encoding="utf-8"))
          shape(value, "marker")
          if value["state"] == "inactive":
              if (
                  value["confirm"] != "NOT_AUTHORIZED"
                  or any(value[key] != ZERO40 for key in ("diagnostic_parent_commit", "authority_commit", "mirror_commit", "candidate_tree"))
                  or any(item != ZERO64 for item in value["bindings"].values())
              ):
                  fail("inactive marker is not zero-bound")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
                  output.write("inspect=false\n")
              raise SystemExit(0)
          if value["state"] != "inspect" or value["confirm"] != "INSPECT_ZENODO_FORMALIZATION_V2_DEPOSITIONS_READ_ONLY":
              fail("marker is not the exact read-only request")
          if git("show", "-s", "--format=%P", "HEAD") != value["diagnostic_parent_commit"]:
              fail("marker does not extend its exact diagnostic parent")
          if os.environ["EVENT_BEFORE"] != value["diagnostic_parent_commit"]:
              fail("inspection push did not fast-forward from the diagnostic parent")
          if git("show", "-s", "--format=%P", "HEAD^") != AUTHORITY_COMMIT:
              fail("diagnostic parent does not extend the exact candidate")
          if git("show", "-s", "--format=%T", "HEAD^^") != CANDIDATE_TREE:
              fail("diagnostic base tree differs")
          if git("diff-tree", "--no-commit-id", "--name-status", "-r", "HEAD^^", "HEAD^").splitlines() != ["A\t" + WORKFLOW, "A\t" + MARKER]:
              fail("diagnostic parent must add only its workflow and inert marker")
          if git("diff-tree", "--no-commit-id", "--name-status", "-r", "HEAD^", "HEAD").splitlines() != ["M\t" + MARKER]:
              fail("inspection commit must modify only the marker")
          parent = json.loads(subprocess.check_output(["git", "show", "HEAD^:" + MARKER]))
          shape(parent, "inert parent marker")
          if parent["state"] != "inactive" or parent["confirm"] != "NOT_AUTHORIZED":
              fail("parent marker was not inert")
          if value["authority_commit"] != AUTHORITY_COMMIT or value["mirror_commit"] != MIRROR_COMMIT or value["candidate_tree"] != CANDIDATE_TREE:
              fail("marker candidate identity differs")
          for key, path in PATHS.items():
              if hashlib.sha256(Path(path).read_bytes()).hexdigest() != value["bindings"][key]:
                  fail("inspection binding differs: " + path)
          effect = json.loads(Path(PATHS["effect_ack_sha256"]).read_text(encoding="utf-8"))
          result = effect.get("effectAckResult", {})
          protocol = result.get("responsibility_protocol", {})
          if result.get("state") != "EFFECT_ACK_DONE" or protocol.get("responsibility_owner") != "Ingolf Lohmann":
              fail("stored release authorization differs")
          if remote(AUTHORITY, os.environ["GH_API_TOKEN"]) != (AUTHORITY_COMMIT, CANDIDATE_TREE):
              fail("authority feature candidate moved")
          if remote(MIRROR, "") != (MIRROR_COMMIT, CANDIDATE_TREE):
              fail("mirror feature candidate moved")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("inspect=true\n")
          PY

      - name: Inventory only the authorized Zenodo concept through GET
        if: steps.marker.outputs.inspect == 'true'
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$ZENODO_ACCESS_TOKEN" || { echo 'BLOCK: ZENODO_ACCESS_TOKEN is unavailable'; exit 1; }
          mkdir -p .qikvrt/release/formalization-v2
          python -I -S -B - <<'PY'
          import hashlib
          import json
          import os
          import re
          import urllib.parse
          import urllib.request
          from pathlib import Path

          SOURCE_ID = 21498774
          CONCEPT_ID = 21488115
          BASE = "https://zenodo.org"
          SOURCE_URL = f"{BASE}/api/deposit/depositions/{SOURCE_ID}"
          LIST_URL = f"{BASE}/api/deposit/depositions?size=100&sort=mostrecent"
          token = os.environ["ZENODO_ACCESS_TOKEN"]

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return None

          opener = urllib.request.build_opener(NoRedirect())

          def get(url):
              if url not in {SOURCE_URL, LIST_URL}:
                  raise SystemExit("BLOCK: unapproved Zenodo inventory URL")
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": "Bearer " + token,
                      "Accept": "application/json",
                      "User-Agent": "qikvrt-formalization-v2-read-only-inventory",
                  },
                  method="GET",
              )
              with opener.open(request, timeout=30) as response:
                  final = urllib.parse.urlsplit(response.geturl())
                  raw = response.read(16 * 1024 * 1024 + 1)
              if final.scheme != "https" or final.hostname != "zenodo.org":
                  raise SystemExit("BLOCK: Zenodo inventory response escaped its origin")
              if len(raw) > 16 * 1024 * 1024:
                  raise SystemExit("BLOCK: Zenodo inventory response exceeded its bound")
              return json.loads(raw.decode("utf-8"))

          def canonical_hash(value):
              raw = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":")).encode("utf-8")
              return hashlib.sha256(raw).hexdigest()

          def subset(actual, expected):
              if isinstance(expected, dict):
                  return isinstance(actual, dict) and all(key in actual and subset(actual[key], value) for key, value in expected.items())
              if isinstance(expected, list):
                  return isinstance(actual, list) and len(actual) == len(expected) and all(subset(left, right) for left, right in zip(actual, expected))
              return actual == expected

          def link_id(value):
              if not isinstance(value, str):
                  return None
              split = urllib.parse.urlsplit(value)
              match = re.fullmatch(r"/api/deposit/depositions/([1-9][0-9]*)/?", split.path)
              if split.scheme != "https" or split.hostname != "zenodo.org" or split.query or split.fragment or match is None:
                  return None
              return int(match.group(1))

          manifest = json.loads(Path("release/formalization-v2-zenodo.json").read_text(encoding="utf-8"))
          target = manifest["software"]["metadata"]
          source = get(SOURCE_URL)
          collection = get(LIST_URL)
          if not isinstance(source, dict) or not isinstance(collection, list) or not all(isinstance(item, dict) for item in collection):
              raise SystemExit("BLOCK: Zenodo inventory shapes differ")
          relevant = []
          for item in collection:
              concept = item.get("conceptrecid")
              record = item.get("record_id", item.get("id"))
              try:
                  concept_id = int(concept)
                  record_id = int(record)
              except (TypeError, ValueError):
                  continue
              if concept_id != CONCEPT_ID and record_id != SOURCE_ID:
                  continue
              metadata = item.get("metadata")
              files = item.get("files")
              links = item.get("links")
              if not isinstance(metadata, dict) or not isinstance(files, list) or not isinstance(links, dict):
                  raise SystemExit("BLOCK: relevant deposition is malformed")
              prereserve = metadata.get("prereserve_doi")
              relevant.append({
                  "id": item.get("id"),
                  "record_id": item.get("record_id"),
                  "conceptrecid": item.get("conceptrecid"),
                  "state": item.get("state"),
                  "submitted": item.get("submitted"),
                  "created": item.get("created"),
                  "modified": item.get("modified"),
                  "self_link_id": link_id(links.get("self")),
                  "latest_draft_link_id": link_id(links.get("latest_draft")),
                  "metadata_sha256": canonical_hash(metadata),
                  "metadata_keys": sorted(metadata),
                  "target_metadata_subset_matches": subset(metadata, target),
                  "target_metadata_exact_keys_plus_prereserve": set(metadata) <= set(target) | {"prereserve_doi"},
                  "prereserved_doi": prereserve.get("doi") if isinstance(prereserve, dict) else None,
                  "files": sorted([
                      {
                          "name": file.get("filename", file.get("key")),
                          "size": file.get("filesize", file.get("size")),
                          "checksum": file.get("checksum"),
                      }
                      for file in files if isinstance(file, dict)
                  ], key=lambda value: str(value["name"])),
              })
          relevant.sort(key=lambda value: int(value["id"]))
          source_links = source.get("links")
          if not isinstance(source_links, dict):
              raise SystemExit("BLOCK: source owner links are malformed")
          evidence = {
              "schema": "qikvrt_formalization_v2_draft_inventory_v1",
              "read_only": True,
              "source": {
                  "id": source.get("id"),
                  "record_id": source.get("record_id"),
                  "conceptrecid": source.get("conceptrecid"),
                  "state": source.get("state"),
                  "submitted": source.get("submitted"),
                  "latest_draft_link_id": link_id(source_links.get("latest_draft")),
              },
              "account_deposition_count": len(collection),
              "relevant_depositions": relevant,
          }
          raw = (json.dumps(evidence, ensure_ascii=False, indent=2, sort_keys=True) + "\n").encode("utf-8")
          if token.encode("utf-8") in raw:
              raise SystemExit("BLOCK: inventory evidence contains secret material")
          path = Path(".qikvrt/release/formalization-v2/draft-inventory.json")
          path.write_bytes(raw)
          print(raw.decode("utf-8"))
          PY

      - name: Upload sanitized read-only deposition inventory
        if: steps.marker.outputs.inspect == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: formalization-v2-draft-inventory-${{ github.sha }}
          path: .qikvrt/release/formalization-v2/draft-inventory.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
