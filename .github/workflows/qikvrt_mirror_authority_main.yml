# Temporary one-shot bootstrap; the exact authority-tree merge removes this file.
# Merge-trigger revision 3: run only after this commit reaches mirror main.
name: QIKVRT mirror verified Alpha 3 authority tree

"on":
  push:
    branches: ["main"]
    paths: [".github/workflows/qikvrt_mirror_authority_main.yml"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: qikvrt-mirror-formalization-v2-alpha3
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout mirror repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          show-progress: false

      - name: Fetch and validate verified authority commit
        shell: bash
        env:
          AUTHORITY_URL: https://github.com/Goldkelch/qik-vrt.git
          AUTHORITY_COMMIT: 37a91599b6d9454a5d1e032fa921f4d56cddb9b0
          EXPECTED_MIRROR_BASE_COMMIT: 5698d7d3c3360db1bcba538b7c06e135e1936e02
        run: |
          set -euo pipefail
          git remote remove authority 2>/dev/null || true
          git remote add authority "$AUTHORITY_URL"
          git fetch --quiet --no-tags --prune authority \
            "+refs/heads/main:refs/remotes/authority/main"
          git cat-file -e "$AUTHORITY_COMMIT^{commit}"
          git merge-base --is-ancestor "$AUTHORITY_COMMIT" refs/remotes/authority/main
          git cat-file -e "$EXPECTED_MIRROR_BASE_COMMIT^{commit}"
          git merge-base --is-ancestor "$EXPECTED_MIRROR_BASE_COMMIT" HEAD

      - name: Verify bootstrap-only mirror divergence
        shell: bash
        env:
          EXPECTED_MIRROR_BASE_COMMIT: 5698d7d3c3360db1bcba538b7c06e135e1936e02
        run: |
          set -euo pipefail
          unexpected_file="$(mktemp)"
          trap 'rm -f "$unexpected_file"' EXIT
          while IFS= read -r path; do
            case "$path" in
              .github/workflows/qikvrt_mirror_authority_main.yml)
                ;;
              *)
                printf '%s\n' "$path" >> "$unexpected_file"
                ;;
            esac
          done < <(git diff --name-only "$EXPECTED_MIRROR_BASE_COMMIT" HEAD)
          if [ -s "$unexpected_file" ]; then
            echo 'BLOCK: unexpected bootstrap-main paths:' >&2
            cat "$unexpected_file" >&2
            exit 1
          fi

      - name: Materialize exact verified authority tree
        shell: bash
        env:
          AUTHORITY_COMMIT: 37a91599b6d9454a5d1e032fa921f4d56cddb9b0
          TARGET_BRANCH: mirror/formalization-v2-alpha3-publication
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mirror_parent="$(git rev-parse HEAD)"
          authority_tree="$(git show -s --format=%T "$AUTHORITY_COMMIT")"
          export GIT_AUTHOR_DATE="$(git show -s --format=%aI "$AUTHORITY_COMMIT")"
          export GIT_COMMITTER_DATE="$(git show -s --format=%cI "$AUTHORITY_COMMIT")"

          message="Mirror published QIK-VRT Formalization 2.0.0-alpha.3

          Authority commit: $AUTHORITY_COMMIT
          Authority tree: $authority_tree
          Mirror parent: $mirror_parent
          DOI: 10.5281/zenodo.21529081

          This two-parent commit preserves the mirror mainline while using the exact verified authority tree."

          mirror_commit="$(printf '%s\n' "$message" | git commit-tree \
            "$authority_tree" \
            -p "$mirror_parent" \
            -p "$AUTHORITY_COMMIT")"

          remote_before="$(git ls-remote origin "refs/heads/$TARGET_BRANCH" | awk '{print $1}')"
          test -z "$remote_before" || {
            echo "BLOCK: target branch unexpectedly exists at $remote_before" >&2
            exit 1
          }
          echo "CREATE target=$TARGET_BRANCH commit=$mirror_commit tree=$authority_tree"
          if ! push_output="$(git push origin "$mirror_commit:refs/heads/$TARGET_BRANCH" 2>&1)"; then
            printf '::error title=Exact-tree mirror push failed::%s\n' "${push_output//$'\n'/' | '}"
            exit 1
          fi

          remote_commit="$(git ls-remote origin "refs/heads/$TARGET_BRANCH" | awk '{print $1}')"
          test "$remote_commit" = "$mirror_commit"
          test "$(git show -s --format=%T "$remote_commit")" = "$authority_tree"
          echo "PASS target=$TARGET_BRANCH commit=$remote_commit tree=$authority_tree"

          {
            echo '## QIK-VRT Alpha 3 mirror materialization'
            echo
            echo "- Authority commit: \`$AUTHORITY_COMMIT\`"
            echo "- Authority tree: \`$authority_tree\`"
            echo "- Mirror parent: \`$mirror_parent\`"
            echo "- Mirror commit: \`$mirror_commit\`"
            echo "- Target branch: \`$TARGET_BRANCH\`"
            echo '- DOI: `10.5281/zenodo.21529081`'
            echo
            echo 'Result: exact verified authority tree persisted as a two-parent mirror commit.'
          } >> "$GITHUB_STEP_SUMMARY"
