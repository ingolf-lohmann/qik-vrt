# Temporary diagnostic; the exact authority-tree merge removes this file.
name: QIKVRT diagnose Alpha 3 exact-tree mirror transport

"on":
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: qikvrt-diagnose-alpha3-mirror-transport
  cancel-in-progress: false

jobs:
  diagnose:
    if: github.head_ref == 'automation/diagnose-alpha3-mirror-push'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout diagnostic candidate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          show-progress: false

      - name: Construct exact mirror commit and persist transport result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          AUTHORITY_URL: https://github.com/Goldkelch/qik-vrt.git
          AUTHORITY_COMMIT: 37a91599b6d9454a5d1e032fa921f4d56cddb9b0
          EXPECTED_MIRROR_BASE_COMMIT: 5698d7d3c3360db1bcba538b7c06e135e1936e02
          TARGET_BRANCH: mirror/formalization-v2-alpha3-publication
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          diagnostics="$(mktemp)"
          trap 'rm -f "$diagnostics"' EXIT
          status=0

          {
            set -e
            git remote remove authority 2>/dev/null || true
            git remote add authority "$AUTHORITY_URL"
            git fetch --quiet --no-tags --prune authority \
              "+refs/heads/main:refs/remotes/authority/main"
            git fetch --quiet --no-tags --prune origin \
              "+refs/heads/main:refs/remotes/origin/main"

            git cat-file -e "$AUTHORITY_COMMIT^{commit}"
            git merge-base --is-ancestor "$AUTHORITY_COMMIT" refs/remotes/authority/main
            git cat-file -e "$EXPECTED_MIRROR_BASE_COMMIT^{commit}"
            git merge-base --is-ancestor "$EXPECTED_MIRROR_BASE_COMMIT" refs/remotes/origin/main

            unexpected_file="$(mktemp)"
            trap 'rm -f "$diagnostics" "$unexpected_file"' EXIT
            while IFS= read -r path; do
              case "$path" in
                .github/workflows/qikvrt_mirror_authority_main.yml)
                  ;;
                *)
                  printf '%s\n' "$path" >> "$unexpected_file"
                  ;;
              esac
            done < <(git diff --name-only "$EXPECTED_MIRROR_BASE_COMMIT" refs/remotes/origin/main)
            if [ -s "$unexpected_file" ]; then
              echo 'BLOCK: unexpected bootstrap-main paths:'
              cat "$unexpected_file"
              exit 1
            fi

            mirror_parent="$(git rev-parse refs/remotes/origin/main)"
            authority_tree="$(git show -s --format=%T "$AUTHORITY_COMMIT")"
            export GIT_AUTHOR_DATE="$(git show -s --format=%aI "$AUTHORITY_COMMIT")"
            export GIT_COMMITTER_DATE="$(git show -s --format=%cI "$AUTHORITY_COMMIT")"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            message="Mirror published QIK-VRT Formalization 2.0.0-alpha.3

            Authority commit: $AUTHORITY_COMMIT
            Authority tree: $authority_tree
            Mirror parent: $mirror_parent
            DOI: 10.5281/zenodo.21529081

            This two-parent commit preserves the mirror mainline while using the exact verified authority tree."
            mirror_commit="$(printf '%s\n' "$message" | git commit-tree \
              "$authority_tree" \
              -p "$mirror_parent" \
              -p "$AUTHORITY_COMMIT")"

            remote_before="$(git ls-remote origin "refs/heads/$TARGET_BRANCH" | awk '{print $1}')"
            if [ -n "$remote_before" ]; then
              echo "BLOCK: target branch already exists at $remote_before"
              exit 1
            fi

            echo "authority_commit=$AUTHORITY_COMMIT"
            echo "authority_tree=$authority_tree"
            echo "mirror_parent=$mirror_parent"
            echo "mirror_commit=$mirror_commit"
            echo "target_branch=$TARGET_BRANCH"
            echo '--- git push output ---'
            git push --porcelain origin "$mirror_commit:refs/heads/$TARGET_BRANCH"
            echo '--- remote verification ---'
            remote_commit="$(git ls-remote origin "refs/heads/$TARGET_BRANCH" | awk '{print $1}')"
            echo "remote_commit=$remote_commit"
            test "$remote_commit" = "$mirror_commit"
            test "$(git show -s --format=%T "$remote_commit")" = "$authority_tree"
            echo 'PASS: exact authority tree persisted'
          } >"$diagnostics" 2>&1 || status=$?

          # Bound and redact the diagnostic before persisting it on the PR.
          sanitized="$(tail -n 120 "$diagnostics" | sed -E 's/(Bearer|token|Authorization:)[^ ]*/\1 [REDACTED]/Ig')"
          if [ "$status" -eq 0 ]; then
            heading='Exact-tree mirror transport: PASS'
          else
            heading='Exact-tree mirror transport: BLOCK'
          fi
          body="## $heading

          \`\`\`text
          $sanitized
          \`\`\`

          Exit status: \`$status\`."
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            -f body="$body"
          exit "$status"
