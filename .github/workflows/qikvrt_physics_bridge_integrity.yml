name: QIKVRT physics bridge integrity

on:
  push:
    branches:
      - agent/formalization-v2-physics-bridge-01
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: qikvrt-physics-bridge-integrity
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/formalization-v2-physics-bridge-01
          fetch-depth: 0
      - name: Install Lean toolchain
        continue-on-error: true
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          lake-package-directory: formalization/QIKVRT_Formalization_v2.0
          test: false
      - name: Capture complete Lean diagnostics
        id: lean_build
        run: |
          set +e
          mkdir -p .qikvrt/evidence
          cd formalization/QIKVRT_Formalization_v2.0
          lake build > ../../../.qikvrt/evidence/physics_bridge_lean_build.log 2>&1
          status=$?
          printf '%s\n' "$status" > ../../../.qikvrt/evidence/physics_bridge_lean_build.exit
          exit 0
      - name: Regenerate and verify repository integrity
        run: |
          set -euo pipefail
          python3 tools/qikvrt_integrity.py generate
          python3 tools/qikvrt_integrity.py verify
      - name: Commit integrity and Lean evidence
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add REPOSITORY_FILE_MANIFEST.json REPOSITORY_FILE_MANIFEST.json.sha256 SHA256SUMS.txt .qikvrt/evidence/physics_bridge_lean_build.log .qikvrt/evidence/physics_bridge_lean_build.exit
          if ! git diff --cached --quiet; then
            git commit -m "ci: materialize physics bridge proof diagnostics"
            git push origin HEAD:agent/formalization-v2-physics-bridge-01
          fi
      - name: Enforce successful Lean build
        run: test "$(cat .qikvrt/evidence/physics_bridge_lean_build.exit)" = "0"
