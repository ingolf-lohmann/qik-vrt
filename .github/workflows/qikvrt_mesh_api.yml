name: QIKVRT Mesh API

on:
  workflow_dispatch:
    inputs:
      operation:
        required: true
        type: choice
        options: [ingest, verify, stage, release_status]
      artifact_id:
        required: true
        type: string
      payload_b64:
        required: false
        default: ''
        type: string
      expected_sha256:
        required: false
        default: ''
        type: string
      dry_run:
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      request_id:
        required: true
        description: Stable idempotency key for this exact request
        type: string
      effect_accepted:
        required: true
        default: 'false'
        description: Explicit scoped effect authorization; required for non-dry-run effects
        type: choice
        options: ['false', 'true']
      state_run_id:
        required: false
        description: Prior workflow run whose qikvrt-api-state artifact must be restored
        type: string
      remote_evidence_b64:
        required: false
        description: HMAC-authenticated qikvrt_remote_release_attestation_v1 JSON encoded as base64
        type: string
  repository_dispatch:
    types: [qikvrt_mesh_api]

permissions:
  contents: read
  actions: read

concurrency:
  group: qikvrt-mesh-api-${{ github.repository }}-${{ github.event.inputs.request_id || github.event.client_payload.request_id || github.run_id }}
  cancel-in-progress: false

jobs:
  qikvrt-mesh-api:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      QIKVRT_OPERATION: ${{ github.event.inputs.operation || github.event.client_payload.operation }}
      QIKVRT_ARTIFACT_ID: ${{ github.event.inputs.artifact_id || github.event.client_payload.artifact_id }}
      QIKVRT_PAYLOAD_B64: ${{ github.event.inputs.payload_b64 || github.event.client_payload.payload_b64 }}
      QIKVRT_EXPECTED_SHA256: ${{ github.event.inputs.expected_sha256 || github.event.client_payload.expected_sha256 }}
      QIKVRT_DRY_RUN: ${{ github.event.inputs.dry_run || github.event.client_payload.dry_run || 'true' }}
      QIKVRT_REQUEST_ID: ${{ github.event.inputs.request_id || github.event.client_payload.request_id }}
      QIKVRT_EFFECT_ACCEPTED: ${{ github.event.inputs.effect_accepted || github.event.client_payload.effect_accepted || 'false' }}
      QIKVRT_RESPONSIBILITY_OWNER: ${{ github.actor }}
      QIKVRT_ORIGIN_AUTHENTICATED: 'true'
      QIKVRT_REMOTE_EVIDENCE_B64: ${{ github.event.inputs.remote_evidence_b64 || github.event.client_payload.remote_evidence_b64 }}
      QIKVRT_REMOTE_ATTESTATION_SECRET: ${{ secrets.QIKVRT_REMOTE_ATTESTATION_SECRET }}
      QIKVRT_TRUSTED_ATTESTATION_SIGNER: ${{ vars.QIKVRT_TRUSTED_ATTESTATION_SIGNER }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Validate state handoff
        env:
          QIKVRT_STATE_RUN_ID: ${{ github.event.inputs.state_run_id || github.event.client_payload.state_run_id }}
        run: |
          case "$QIKVRT_OPERATION" in
            verify|stage)
              test -n "$QIKVRT_STATE_RUN_ID" || {
                echo "BLOCK: verify/stage require state_run_id from a prior trusted workflow run" >&2
                exit 1
              }
              ;;
          esac
      - name: Bind prior state run to this repository, workflow and commit
        if: ${{ github.event.inputs.state_run_id != '' || github.event.client_payload.state_run_id != '' }}
        env:
          QIKVRT_STATE_RUN_ID: ${{ github.event.inputs.state_run_id || github.event.client_payload.state_run_id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 -I tools/qikvrt_validate_state_run.py
      - name: Restore prior content-addressed state
        if: ${{ github.event.inputs.state_run_id != '' || github.event.client_payload.state_run_id != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: qikvrt-api-state
          path: .qikvrt/api
          run-id: ${{ github.event.inputs.state_run_id || github.event.client_payload.state_run_id }}
          github-token: ${{ github.token }}
      - name: Run QIKVRT API handler
        run: python3 src/qikvrt_api_handler.py
      - name: Upload audit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-api-state
          retention-days: 30
          path: |
            .qikvrt/api/audit/**
            .qikvrt/api/inbox/**
            .qikvrt/api/out/**
            .qikvrt/api/provenance/**
            .qikvrt/api/replay/**
            .qikvrt/api/protocol/**
            .qikvrt/api/transactions/**
          if-no-files-found: warn
