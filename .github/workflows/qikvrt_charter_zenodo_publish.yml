name: QIKVRT charter Zenodo publication

on:
  push:
    branches:
      - automation/machine-verifiable-science-zenodo-20260723
    paths:
      - release/machine-verifiable-science/publish-request.json

permissions:
  contents: write

concurrency:
  group: qikvrt-charter-zenodo-production
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'Goldkelch/qik-vrt'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out exact authorization commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Bind CPython 3.12.13 x64
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12.13'
          architecture: x64

      - name: Restore verified Zenodo capability cache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
        with:
          path: .qikvrt/cache/zenodo-publication
          key: zenodo-publication-${{ runner.os }}-${{ hashFiles('tools/qikvrt_charter_zenodo.py', 'tools/qikvrt_zenodo_actions.py', 'runtime/capabilities/ZENODO_PUBLICATION_CAPABILITY.json') }}

      - name: Materialize capability receipts and self-test
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .qikvrt/cache/zenodo-publication/pycache
          sha256sum \
            tools/qikvrt_charter_zenodo.py \
            tools/qikvrt_zenodo_actions.py \
            runtime/capabilities/ZENODO_PUBLICATION_CAPABILITY.json \
            > .qikvrt/cache/zenodo-publication/SHA256SUMS.txt
          PYTHONPYCACHEPREFIX="$PWD/.qikvrt/cache/zenodo-publication/pycache" \
            python -B -m py_compile tools/qikvrt_charter_zenodo.py tools/qikvrt_zenodo_actions.py
          python -B tools/qikvrt_charter_zenodo.py --help >/dev/null 2>&1 || test $? -eq 2
          printf '%s\n' 'CAPABILITY_SELF_TEST=PASS' > .qikvrt/cache/zenodo-publication/self-test.receipt

      - name: Publish hash-gated charter to production Zenodo
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
          ZENODO_API_BASE: https://zenodo.org/api
        run: |
          set -euo pipefail
          python -B tools/qikvrt_charter_zenodo.py
          test -s release/machine-verifiable-science/zenodo-publication.json

      - name: Commit publication evidence to authorization branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add release/machine-verifiable-science/zenodo-publication.json
          git commit -m 'evidence: bind published charter DOI and remote hashes'
          git push origin HEAD:automation/machine-verifiable-science-zenodo-20260723
