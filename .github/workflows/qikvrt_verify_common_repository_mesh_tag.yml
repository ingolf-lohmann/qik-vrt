# Temporary verification transport; never merge this workflow.
name: QIKVRT verify common repository mesh tag

on:
  push:
    branches:
      - automation/import-dependency-authority-20260724
    paths:
      - .github/workflows/qikvrt_verify_common_repository_mesh_tag.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      TAG: v2026.07.24-repository-mesh-sync-1.0.0
      AUTHORITY_COMMIT: 187113e970f810db54697db5681a6c8d77c26e98
      MIRROR_COMMIT: 5266ae8625a20508a7c1af1c3a6aa4d0b104f170
      SHARED_TREE: cd91a4961934610b95464dea8a5b912cdc4683a7
      TRANSPORT_BRANCH: automation/import-dependency-authority-20260724
      EVIDENCE_PATH: release/common-repository-mesh-tag-verification.json
    steps:
      - name: Verify both public annotated tag objects and persist evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 -B - <<'PY'
          from __future__ import annotations

          import base64
          import hashlib
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          repositories = (
              ('Goldkelch/qik-vrt', os.environ['AUTHORITY_COMMIT']),
              ('ingolf-lohmann/qik-vrt', os.environ['MIRROR_COMMIT']),
          )
          tag = os.environ['TAG']
          shared_tree = os.environ['SHARED_TREE']
          fixed_message = (
              'QIK-VRT synchronized repository mesh snapshot 1.0.0\n\n'
              'Common annotated tag for the byte-identical Authority and Mirror '
              'content tree after dependency-security maintenance, authenticated '
              'repository-native audio requests, Zenodo inventory refresh, and '
              'status documentation synchronization. No GitHub Release object and '
              'no new Zenodo publication are created.'
          )
          fixed_tagger = {
              'name': 'Ingolf Lohmann',
              'email': 'ingolf.lohmann@live.com',
              'date': '2026-07-24T17:30:00Z',
          }

          def public_get(repository: str, path: str):
              request = urllib.request.Request(
                  f'https://api.github.com/repos/{repository}/{path}',
                  headers={
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'User-Agent': 'qikvrt-common-tag-verifier',
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          verified = []
          encoded_tag = urllib.parse.quote(tag, safe='')
          for repository, expected_commit in repositories:
              main = public_get(repository, 'git/ref/heads/main')
              if main.get('object', {}).get('sha') != expected_commit:
                  raise SystemExit(f'BLOCK: {repository} main differs')
              ref = public_get(repository, 'git/ref/tags/' + encoded_tag)
              if ref.get('object', {}).get('type') != 'tag':
                  raise SystemExit(f'BLOCK: {repository} tag ref is not annotated')
              tag_object_sha = ref['object']['sha']
              value = public_get(repository, 'git/tags/' + tag_object_sha)
              target = value.get('object', {})
              tagger = value.get('tagger', {})
              if (
                  value.get('tag') != tag
                  or value.get('message') != fixed_message
                  or target.get('type') != 'commit'
                  or target.get('sha') != expected_commit
                  or {key: tagger.get(key) for key in fixed_tagger} != fixed_tagger
              ):
                  raise SystemExit(f'BLOCK: {repository} annotated tag contract differs')
              commit = public_get(repository, 'git/commits/' + expected_commit)
              if commit.get('tree', {}).get('sha') != shared_tree:
                  raise SystemExit(f'BLOCK: {repository} target tree differs')
              verified.append({
                  'repository': repository,
                  'main_commit': expected_commit,
                  'tag_ref_object_type': 'tag',
                  'tag_object_sha': tag_object_sha,
                  'tag_target_commit': target['sha'],
                  'tagger': fixed_tagger,
                  'shared_tree': shared_tree,
                  'state': 'ANNOTATED_TAG_VERIFIED',
              })

          evidence = {
              'schema': 'qikvrt_common_repository_mesh_tag_verification_v1',
              'tag': tag,
              'shared_tree': shared_tree,
              'repositories': verified,
              'status': 'PASS_COMMON_ANNOTATED_TAG_AND_SHARED_TREE',
          }
          canonical = json.dumps(
              evidence, ensure_ascii=False, sort_keys=True, separators=(',', ':')
          ).encode('utf-8')
          evidence['canonical_sha256'] = hashlib.sha256(canonical).hexdigest()
          raw = (json.dumps(
              evidence, ensure_ascii=False, indent=2, sort_keys=True
          ) + '\n').encode('utf-8')

          repository = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']
          path = os.environ['EVIDENCE_PATH']
          branch = os.environ['TRANSPORT_BRANCH']
          encoded_path = urllib.parse.quote(path, safe='/')
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json',
              'User-Agent': 'qikvrt-common-tag-evidence-writer',
          }

          def request(method: str, suffix: str, payload=None, missing=False):
              data = None if payload is None else json.dumps(
                  payload, separators=(',', ':')
              ).encode('utf-8')
              req = urllib.request.Request(
                  f'https://api.github.com/repos/{repository}/{suffix}',
                  data=data,
                  method=method,
                  headers=headers,
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as response:
                      return json.load(response)
              except urllib.error.HTTPError as error:
                  if missing and error.code == 404:
                      return None
                  raise

          branch_query = urllib.parse.quote(branch, safe='')
          existing = request(
              'GET', f'contents/{encoded_path}?ref={branch_query}', missing=True
          )
          payload = {
              'message': 'Record common repository mesh tag verification',
              'content': base64.b64encode(raw).decode('ascii'),
              'branch': branch,
          }
          if existing is not None:
              payload['sha'] = existing['sha']
          result = request('PUT', f'contents/{encoded_path}', payload)
          print(json.dumps({
              'status': evidence['status'],
              'canonical_sha256': evidence['canonical_sha256'],
              'evidence_commit': result['commit']['sha'],
          }, sort_keys=True))
          PY
