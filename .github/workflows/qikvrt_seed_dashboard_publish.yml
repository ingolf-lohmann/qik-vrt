name: QIKVRT Seed Dashboard Publish
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: QIKVRT run id
        required: false
        type: string
  schedule:
    - cron: '5 */6 * * *'
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      QIKVRT_RUN_ID: ${{ inputs.run_id || github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Run QIKVRT Seed Dashboard Publish
        run: sh tools/qikvrt_seed_dashboard_publish.sh
      - name: Commit QIKVRT outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs evidence || true
          if git diff --cached --quiet; then
            echo "QIKVRT_NO_CHANGES"
          else
            git commit -m "QIKVRT 4AU QIKVRT Seed Dashboard Publish $QIKVRT_RUN_ID"
            git push
          fi
