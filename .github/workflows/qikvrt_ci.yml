name: QIKVRT CI

on:
  push:
    branches-ignore:
      - automation/effect-ack-universality-reserve-20260722
      - automation/effect-ack-universality-finalize-20260722
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Full compile, launcher, protocol, handler, security and TCP/IP tests
        id: full_test
        continue-on-error: true
        shell: bash
        run: |
          set +e
          diagnostics=.qikvrt/runtime/ci-diagnostics
          mkdir -p "$diagnostics"
          make test > "$diagnostics/MAKE_TEST_FULL.log" 2>&1
          status=$?
          {
            printf 'MAKE_TEST_EXIT=%s\n' "$status"
            printf '%s\n' '--- LAST 500 LINES ---'
            tail -n 500 "$diagnostics/MAKE_TEST_FULL.log"
          } > "$diagnostics/MAKE_TEST_DIAGNOSTICS.log"
          mkdir -p audit/ci-diagnostics
          cp "$diagnostics/MAKE_TEST_DIAGNOSTICS.log" \
            audit/ci-diagnostics/MAKE_TEST_DIAGNOSTICS.log
          cat "$diagnostics/MAKE_TEST_DIAGNOSTICS.log"
          exit "$status"
      - name: Upload audit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-ci-audit
          retention-days: 30
          path: |
            audit/**
            .qikvrt/**
          if-no-files-found: warn
          include-hidden-files: true
      - name: Enforce full repository test result
        if: steps.full_test.outcome == 'failure'
        shell: bash
        run: |
          cat audit/ci-diagnostics/MAKE_TEST_DIAGNOSTICS.log
          exit 1
