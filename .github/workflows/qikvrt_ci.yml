name: QIKVRT CI

"on":
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: false
      - name: Full compile, launcher, protocol, handler, security and TCP/IP tests
        run: make test
      - name: Upload audit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-ci-audit
          retention-days: 30
          path: |
            audit/**
            .qikvrt/**
          if-no-files-found: warn

  mirror-authority-tree:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'automation/mirror-manuscript-formalization-v2'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout mirror repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          show-progress: false

      - name: Materialize exact verified authority tree
        shell: bash
        run: |
          mkdir -p .qikvrt/evidence
          exec > >(tee .qikvrt/evidence/mirror-executor.log) 2>&1
          set -euxo pipefail

          AUTHORITY_URL="https://github.com/Goldkelch/qik-vrt.git"
          AUTHORITY_COMMIT="3d640b05e815ff8644fe7640ddd7dcf89d4094c4"
          EXPECTED_MIRROR_BASE_COMMIT="ac05aeff4835aeab049a22f3b6271c3224856dc2"
          TARGET_BRANCH="mirror/manuscript-formalization-v2-completion"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git remote get-url authority >/dev/null 2>&1; then
            git remote set-url authority "$AUTHORITY_URL"
          else
            git remote add authority "$AUTHORITY_URL"
          fi
          git fetch --no-tags --prune authority "+refs/heads/main:refs/remotes/authority/main"
          git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main"

          git cat-file -e "$AUTHORITY_COMMIT^{commit}"
          git merge-base --is-ancestor "$AUTHORITY_COMMIT" refs/remotes/authority/main
          git cat-file -e "$EXPECTED_MIRROR_BASE_COMMIT^{commit}"

          mirror_parent="$(git rev-parse refs/remotes/origin/main)"
          authority_tree="$(git show -s --format=%T "$AUTHORITY_COMMIT")"
          git merge-base --is-ancestor "$EXPECTED_MIRROR_BASE_COMMIT" "$mirror_parent"

          unexpected="$(git diff --name-only "$EXPECTED_MIRROR_BASE_COMMIT" "$mirror_parent" | grep -Ev '^(\.github/workflows/qikvrt_batch04_integrity\.yml|\.github/workflows/qikvrt_ci\.yml|\.github/workflows/qikvrt_mirror_authority_main\.yml|\.qikvrt/evidence/mirror-bootstrap-final-retrigger\.json|REPOSITORY_FILE_MANIFEST\.json|REPOSITORY_FILE_MANIFEST\.json\.sha256|SHA256SUMS\.txt)$' || true)"
          if [ -n "$unexpected" ]; then
            printf 'BLOCK unexpected bootstrap paths:\n%s\n' "$unexpected" >&2
            exit 1
          fi

          export GIT_AUTHOR_DATE="$(git show -s --format=%aI "$AUTHORITY_COMMIT")"
          export GIT_COMMITTER_DATE="$(git show -s --format=%cI "$AUTHORITY_COMMIT")"
          message="$(printf 'Mirror completed 62-page manuscript formalization\n\nAuthority commit: %s\nAuthority tree: %s\nMirror parent: %s\n\nExact verified authority tree persisted with mirror main as first parent and authority commit as second parent.\n' "$AUTHORITY_COMMIT" "$authority_tree" "$mirror_parent")"
          mirror_commit="$(printf '%s\n' "$message" | git commit-tree "$authority_tree" -p "$mirror_parent" -p "$AUTHORITY_COMMIT")"

          git push origin "$mirror_commit:refs/heads/$TARGET_BRANCH"
          remote_commit="$(git ls-remote origin "refs/heads/$TARGET_BRANCH" | awk '{print $1}')"
          test "$remote_commit" = "$mirror_commit"
          git cat-file -e "$remote_commit^{commit}"
          remote_tree="$(git show -s --format=%T "$remote_commit")"
          test "$remote_tree" = "$authority_tree"

          {
            echo '## QIK-VRT exact-tree mirror'
            echo
            printf -- '- Authority commit: `%s`\n' "$AUTHORITY_COMMIT"
            printf -- '- Authority tree: `%s`\n' "$authority_tree"
            printf -- '- Mirror commit: `%s`\n' "$mirror_commit"
            printf -- '- Target branch: `%s`\n' "$TARGET_BRANCH"
            echo
            echo 'Result: exact authority tree persisted and independently re-read from the remote branch.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload mirror executor diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-mirror-executor-diagnostics
          retention-days: 30
          path: .qikvrt/evidence/mirror-executor.log
          if-no-files-found: error
