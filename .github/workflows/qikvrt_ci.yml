name: QIKVRT CI

"on":
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Full compile, launcher, protocol, handler, security and TCP/IP tests
        run: make test
      - name: Upload audit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-ci-audit
          retention-days: 30
          path: |
            audit/**
            .qikvrt/**
          if-no-files-found: warn

  mirror-authority-tree:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'automation/mirror-manuscript-formalization-v2'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout mirror repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Materialize exact verified authority tree
        shell: bash
        run: bash tools/qikvrt_mirror_authority.sh
