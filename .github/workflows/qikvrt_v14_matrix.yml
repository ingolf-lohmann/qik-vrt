name: qikvrt-v14-matrix
on:
  workflow_dispatch:
  push:
  pull_request:
jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Master acceptance gate
        run: python tools/qikvrt_master_acceptance_gate.py
      - name: Launcher master gate
        run: python qikvrt.py master-gate
      - name: CI/CD dry run
        run: python qikvrt.py cicd-publish -- --mode dry-run --no-interactive
      - name: Windows CMD gate
        if: runner.os == 'Windows'
        run: qikvrt.cmd master-gate
      - name: Windows PowerShell gate
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./qikvrt.ps1 master-gate
      - name: Unix shell gate
        if: runner.os != 'Windows'
        run: bash qikvrt.sh master-gate
