name: QIK-VRT formalization v2 read-only draft inspection

on:
  push:
    branches:
      - automation/formalization-v2-inspect-20260723
    paths:
      - release/formalization-v2-inspection-request.json

permissions:
  contents: read

concurrency:
  group: qikvrt-formalization-v2-inspection-${{ github.repository }}
  cancel-in-progress: false

jobs:
  inspect:
    if: github.repository == 'Goldkelch/qik-vrt'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the two-commit inspection branch without credentials
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 2
          persist-credentials: false

      - name: Validate inert or marker-only read-only inspection request
        id: marker
        env:
          GH_API_TOKEN: ${{ github.token }}
          EVENT_AFTER: ${{ github.event.after }}
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_FORCED: ${{ github.event.forced }}
          EVENT_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          python -I -S -B - <<'PY'
          import hashlib
          import json
          import os
          import re
          import subprocess
          import urllib.parse
          import urllib.request
          from pathlib import Path

          MARKER = "release/formalization-v2-inspection-request.json"
          AUTHORITY = "Goldkelch/qik-vrt"
          MIRROR = "ingolf-lohmann/qik-vrt"
          FEATURE = "agent/manuscript-formalization-v2-alpha"
          REF = "refs/heads/automation/formalization-v2-inspect-20260723"
          AUTHORITY_PARENT = "8d39c93b738ac53ea952f8d8dda78aea973961cd"
          MIRROR_PARENT = "48a9f2c642ed6fb22daa4d841f606d33d5b65c37"
          ZERO40 = "0" * 40
          ZERO64 = "0" * 64
          SHA1 = re.compile(r"[0-9a-f]{40}\Z")
          SHA256 = re.compile(r"[0-9a-f]{64}\Z")
          PATHS = {
              "effect_ack_sha256": "formalization/QIKVRT_Formalization_v2.0/release_authorization/EFFECT_ACK_DONE.json",
              "manifest_sha256": "release/formalization-v2-zenodo.json",
              "workflow_sha256": ".github/workflows/qikvrt_formalization_v2_inspect.yml",
          }

          def fail(message):
              raise SystemExit("BLOCK: " + message)

          def git(*args):
              return subprocess.check_output(["git", *args], text=True).strip()

          def exact(value, keys, where):
              if not isinstance(value, dict) or set(value) != set(keys):
                  fail(where + " keys differ")

          def shape(value, where):
              exact(value, {"schema", "request_id", "state", "confirm", "candidate", "bindings"}, where)
              exact(value["candidate"], {"authority_repository", "mirror_repository", "feature_branch", "candidate_commit", "candidate_tree", "mirror_commit", "mirror_tree"}, where + ".candidate")
              exact(value["bindings"], PATHS, where + ".bindings")
              if value["schema"] != "qikvrt_formalization_v2_draft_inspection_request_v1" or value["request_id"] != "2026-07-23-formalization-v2.0-alpha.1-draft-inspection":
                  fail(where + " identity differs")
              c = value["candidate"]
              if c["authority_repository"] != AUTHORITY or c["mirror_repository"] != MIRROR or c["feature_branch"] != FEATURE:
                  fail(where + " repository policy differs")
              if any(SHA1.fullmatch(c[key]) is None for key in ("candidate_commit", "candidate_tree", "mirror_commit", "mirror_tree")):
                  fail(where + " commit/tree binding is malformed")
              if any(SHA256.fullmatch(item) is None for item in value["bindings"].values()):
                  fail(where + " SHA-256 binding is malformed")

          def api(repository, suffix, token):
              headers = {"Accept": "application/vnd.github+json", "X-GitHub-Api-Version": "2022-11-28", "User-Agent": "qikvrt-formalization-v2-inspection-gate"}
              if token:
                  headers["Authorization"] = "Bearer " + token
              request = urllib.request.Request(f"https://api.github.com/repos/{repository}/{suffix}", headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  value = json.load(response)
              if not isinstance(value, dict):
                  fail("GitHub API returned a non-object")
              return value

          def remote(repository, token):
              ref = api(repository, "git/ref/heads/" + urllib.parse.quote(FEATURE, safe="/"), token)
              obj = ref.get("object")
              sha = obj.get("sha") if isinstance(obj, dict) else None
              if not isinstance(sha, str) or SHA1.fullmatch(sha) is None:
                  fail(repository + " feature ref is invalid")
              commit = api(repository, "git/commits/" + sha, token)
              tree = commit.get("tree")
              tree_sha = tree.get("sha") if isinstance(tree, dict) else None
              parents = commit.get("parents")
              parent_shas = [item.get("sha") for item in parents] if isinstance(parents, list) and all(isinstance(item, dict) for item in parents) else []
              return sha, tree_sha, parent_shas

          if os.environ["GITHUB_REPOSITORY"] != AUTHORITY or os.environ["EVENT_REF"] != REF or os.environ["EVENT_FORCED"] != "false" or os.environ["EVENT_AFTER"] != os.environ["GITHUB_SHA"]:
              fail("inspection event envelope differs")
          value = json.loads(Path(MARKER).read_text(encoding="utf-8"))
          shape(value, "marker")
          if value["state"] == "inactive":
              if value["confirm"] != "NOT_AUTHORIZED" or any(item != ZERO64 for item in value["bindings"].values()) or any(item != ZERO40 for key, item in value["candidate"].items() if key.endswith("commit") or key.endswith("tree")):
                  fail("inactive inspection marker is not zero-bound")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
                  output.write("inspect=false\n")
              raise SystemExit(0)
          if value["state"] != "inspect" or value["confirm"] != "INSPECT_ZENODO_FORMALIZATION_V2_DRAFT_READ_ONLY":
              fail("inspection marker is not exactly authorized")
          c = value["candidate"]
          if git("show", "-s", "--format=%P", "HEAD").split() != [c["candidate_commit"]] or os.environ["EVENT_BEFORE"] != c["candidate_commit"]:
              fail("inspection marker does not extend the exact candidate")
          if git("show", "-s", "--format=%T", "HEAD^") != c["candidate_tree"]:
              fail("inspection candidate tree differs")
          if git("diff-tree", "--no-commit-id", "--name-status", "-r", "HEAD^", "HEAD").splitlines() != ["M\t" + MARKER]:
              fail("inspection commit must modify only the marker")
          parent = json.loads(subprocess.check_output(["git", "show", "HEAD^:" + MARKER]))
          shape(parent, "candidate marker")
          if parent["state"] != "inactive" or parent["confirm"] != "NOT_AUTHORIZED" or any(item != ZERO64 for item in parent["bindings"].values()):
              fail("candidate inspection marker was not inert")
          for key, path in PATHS.items():
              if hashlib.sha256(Path(path).read_bytes()).hexdigest() != value["bindings"][key]:
                  fail("inspection byte binding differs: " + path)
          effect = json.loads(Path(PATHS["effect_ack_sha256"]).read_text())
          result = effect.get("effectAckResult", {})
          protocol = result.get("responsibility_protocol", {})
          if result.get("state") != "EFFECT_ACK_DONE" or result.get("ordinary_release") is not True or protocol.get("state") != "EFFECT_ACK_DONE" or protocol.get("ordinary_release") is not True or protocol.get("responsibility_owner") != "Ingolf Lohmann":
              fail("stored effect authorization differs")
          authority = remote(AUTHORITY, os.environ["GH_API_TOKEN"])
          mirror = remote(MIRROR, "")
          if authority != (c["candidate_commit"], c["candidate_tree"], [AUTHORITY_PARENT]) or mirror != (c["mirror_commit"], c["mirror_tree"], [MIRROR_PARENT]) or c["candidate_tree"] != c["mirror_tree"]:
              fail("inspection candidate is not fixed in both repositories")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("inspect=true\n")
              output.write("candidate_commit=" + c["candidate_commit"] + "\n")
          PY

      - name: Check out exact inspection candidate
        if: steps.marker.outputs.inspect == 'true'
        run: git checkout --detach "${{ steps.marker.outputs.candidate_commit }}"

      - name: Inspect owner-linked Zenodo draft using GET only
        if: steps.marker.outputs.inspect == 'true'
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$ZENODO_ACCESS_TOKEN" || { echo 'BLOCK: ZENODO_ACCESS_TOKEN is unavailable'; exit 1; }
          mkdir -p .qikvrt/release/formalization-v2
          python -I -S -B - <<'PY'
          import hashlib
          import json
          import os
          import re
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          token = os.environ["ZENODO_ACCESS_TOKEN"]
          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return None
          opener = urllib.request.build_opener(NoRedirect())

          def get(url):
              split = urllib.parse.urlsplit(url)
              if split.scheme != "https" or split.hostname != "zenodo.org" or split.query or split.fragment or not split.path.startswith("/api/"):
                  raise SystemExit("BLOCK: Zenodo inspection URL escaped the fixed API origin")
              request = urllib.request.Request(url, headers={"Authorization": "Bearer " + token, "Accept": "application/json", "User-Agent": "qikvrt-formalization-v2-read-only-inspector"}, method="GET")
              with opener.open(request, timeout=30) as response:
                  raw = response.read(4 * 1024 * 1024 + 1)
              if len(raw) > 4 * 1024 * 1024:
                  raise SystemExit("BLOCK: Zenodo inspection response exceeded its bound")
              value = json.loads(raw.decode("utf-8"))
              if not isinstance(value, dict):
                  raise SystemExit("BLOCK: Zenodo inspection returned a non-object")
              return value

          def canonical_hash(value):
              raw = json.dumps(value, ensure_ascii=False, sort_keys=True, separators=(",", ":")).encode("utf-8")
              return hashlib.sha256(raw).hexdigest()

          def subset(actual, expected):
              if isinstance(expected, dict):
                  return isinstance(actual, dict) and all(key in actual and subset(actual[key], value) for key, value in expected.items())
              if isinstance(expected, list):
                  return isinstance(actual, list) and len(actual) == len(expected) and all(subset(left, right) for left, right in zip(actual, expected))
              return actual == expected

          source = get("https://zenodo.org/api/deposit/depositions/21498774")
          links = source.get("links")
          latest = links.get("latest_draft") if isinstance(links, dict) else None
          if not isinstance(latest, str):
              raise SystemExit("BLOCK: source has no owner-linked latest_draft")
          safe_latest = urllib.parse.urlsplit(latest)
          match = re.fullmatch(r"/api/deposit/depositions/([1-9][0-9]*)", safe_latest.path.rstrip("/"))
          if safe_latest.scheme != "https" or safe_latest.hostname != "zenodo.org" or safe_latest.query or safe_latest.fragment or match is None:
              raise SystemExit("BLOCK: latest_draft link is not one exact Zenodo deposition")
          linked_id = int(match.group(1))
          draft = get(latest)
          manifest = json.loads(Path("release/formalization-v2-zenodo.json").read_text(encoding="utf-8"))
          target = manifest["software"]["metadata"]
          metadata = draft.get("metadata")
          files = draft.get("files")
          if not isinstance(metadata, dict) or not isinstance(files, list) or not all(isinstance(item, dict) for item in files):
              raise SystemExit("BLOCK: draft metadata or files are malformed")
          prereserve = metadata.get("prereserve_doi")
          evidence = {
              "schema": "qikvrt_formalization_v2_draft_inspection_v1",
              "read_only": True,
              "source": {"id": source.get("id"), "record_id": source.get("record_id"), "conceptrecid": source.get("conceptrecid")},
              "latest_draft_link_id": linked_id,
              "draft": {
                  "id": draft.get("id"), "record_id": draft.get("record_id"), "conceptrecid": draft.get("conceptrecid"),
                  "state": draft.get("state"), "submitted": draft.get("submitted"), "created": draft.get("created"), "modified": draft.get("modified"),
                  "metadata_sha256": canonical_hash(metadata), "metadata_keys": sorted(metadata),
                  "target_metadata_subset_matches": subset(metadata, target),
                  "target_metadata_exact_keys_plus_prereserve": set(metadata) <= set(target) | {"prereserve_doi"},
                  "prereserved_doi": prereserve.get("doi") if isinstance(prereserve, dict) else None,
                  "files": sorted([
                      {"name": item.get("filename", item.get("key")), "size": item.get("filesize", item.get("size")), "checksum": item.get("checksum")}
                      for item in files
                  ], key=lambda item: str(item["name"])),
              },
          }
          raw = (json.dumps(evidence, ensure_ascii=False, indent=2, sort_keys=True) + "\n").encode("utf-8")
          if token.encode("utf-8") in raw:
              raise SystemExit("BLOCK: inspection evidence contains secret material")
          path = Path(".qikvrt/release/formalization-v2/draft-inspection.json")
          path.write_bytes(raw)
          print(raw.decode("utf-8"))
          PY

      - name: Upload sanitized read-only draft inspection
        if: steps.marker.outputs.inspect == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: formalization-v2-draft-inspection-${{ steps.marker.outputs.candidate_commit }}
          path: .qikvrt/release/formalization-v2/draft-inspection.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
