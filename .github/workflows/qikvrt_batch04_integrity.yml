# Generalized deterministic evidence materializer for protected repository states.
name: QIKVRT repository evidence materialization

on:
  push:
    branches:
      - main
      - agent/formalization-cache-hmi-batch04
      - agent/manuscript-formalization-v2-completion
      - automation/generalize-repository-evidence-20260724
      - automation/machine-verifiable-science-zenodo-20260723
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: qikvrt-repository-evidence-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  materialize:
    if: >-
      github.event_name != 'pull_request' ||
      github.head_ref == 'automation/generalize-repository-evidence-20260724' ||
      github.head_ref == 'automation/machine-verifiable-science-zenodo-20260723'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TARGET_REF: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Materialize completed manuscript evidence when present
        shell: bash
        run: |
          set -euo pipefail
          root="formalization/QIKVRT_Formalization_v2.0"
          if [ ! -f "$root/scripts/materialize_completion.py" ]; then
            echo "Completion materializer is not present on this branch."
            exit 0
          fi
          (
            cd "$root"
            python3 scripts/materialize_completion.py
            python3 scripts/render_completion_proof_map.py
            python3 scripts/render_completion_verification_report.py
            python3 scripts/materialize_completion_proof_manifest.py
            python3 scripts/materialize_completion.py --check
            python3 scripts/render_completion_proof_map.py --check
            python3 scripts/render_completion_verification_report.py --check
            python3 scripts/materialize_completion_proof_manifest.py --check
            python3 scripts/validate_completion_claim_graph.py
          )
      - name: Rebuild deterministic formalization release bundle when present
        shell: bash
        run: |
          set -euo pipefail
          script="formalization/QIKVRT_Formalization_v2.0/scripts/package_release.py"
          manifest="release/formalization-v2-alpha2-zenodo.json"
          archive="release/formalization-v2/QIKVRT_Formalization_v2.0-alpha.2.zip"
          sums="release/formalization-v2/ZENODO_SHA256SUMS-alpha.2"
          if [ ! -f "$script" ] || [ ! -f "$manifest" ]; then
            echo "Formalization release bundle is not present on this branch."
            exit 0
          fi
          python3 "$script" \
            --repository-root . \
            --output "$archive" \
            --zenodo-checksums "$sums"
          python3 - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import pathlib
          import re

          root = pathlib.Path('.').resolve()
          manifest_path = root / 'release/formalization-v2-alpha2-zenodo.json'
          value = json.loads(manifest_path.read_text(encoding='utf-8'))
          files = value['software']['files']
          archive_digest = None
          for entry in files:
              path = root / entry['path']
              raw = path.read_bytes()
              entry['size'] = len(raw)
              entry['md5'] = hashlib.md5(raw, usedforsecurity=False).hexdigest()
              entry['sha256'] = hashlib.sha256(raw).hexdigest()
              if entry['name'] == 'QIKVRT_Formalization_v2.0-alpha.2.zip':
                  archive_digest = entry['sha256']
          if archive_digest is None:
              raise SystemExit('BLOCK: archive entry is absent from the Zenodo manifest')
          notes = value['software']['metadata']['notes']
          notes, count = re.subn(
              r'Autorisiertes Archiv SHA-256: [0-9a-f]{64}\.',
              f'Autorisiertes Archiv SHA-256: {archive_digest}.',
              notes,
              count=1,
          )
          if count != 1:
              raise SystemExit('BLOCK: archive digest note is absent or ambiguous')
          value['software']['metadata']['notes'] = notes
          manifest_path.write_text(
              json.dumps(value, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
              newline='\n',
          )
          PY
          python3 -B tests/test_formalization_v2_release_workflow.py
      - name: Regenerate and verify repository integrity
        run: |
          set -euo pipefail
          python3 tools/qikvrt_integrity.py generate
          python3 tools/qikvrt_integrity.py verify
      - name: Run repository gates before persistence
        shell: bash
        run: |
          set -euo pipefail
          make test
          python3 tools/qikvrt_integrity.py verify
      - name: Commit materialized evidence and integrity outputs
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            formalization/QIKVRT_Formalization_v2.0/claims/TEX_ENVIRONMENTS.json \
            formalization/QIKVRT_Formalization_v2.0/claims/APPENDIX_MATRIX.json \
            formalization/QIKVRT_Formalization_v2.0/claims/CLAIM_GRAPH.json \
            formalization/QIKVRT_Formalization_v2.0/MANUSCRIPT_PROOF_MAP.md \
            formalization/QIKVRT_Formalization_v2.0/VERIFICATION_REPORT.md \
            formalization/QIKVRT_Formalization_v2.0/proofs/PROOF_OBJECT_MANIFEST.json \
            release/formalization-v2/QIKVRT_Formalization_v2.0-alpha.2.zip \
            release/formalization-v2/QIKVRT_Formalization_v2.0-alpha.2.zip.sha256 \
            release/formalization-v2/ZENODO_SHA256SUMS-alpha.2 \
            release/formalization-v2-alpha2-zenodo.json \
            REPOSITORY_FILE_MANIFEST.json \
            REPOSITORY_FILE_MANIFEST.json.sha256 \
            SHA256SUMS.txt
          if git diff --cached --quiet; then
            echo "Repository evidence is already current."
            exit 0
          fi
          git commit -m "ci: materialize repository evidence"
          git push origin "HEAD:$TARGET_REF"
