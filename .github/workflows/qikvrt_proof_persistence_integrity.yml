name: QIKVRT proof persistence integrity

on:
  push:
    branches:
      - agent/proof-persistence-batch05
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: qikvrt-proof-persistence-integrity
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: agent/proof-persistence-batch05
          fetch-depth: 0
      - name: Regenerate and verify repository integrity
        run: |
          set -euo pipefail
          python3 tools/qikvrt_integrity.py generate
          python3 tools/qikvrt_integrity.py verify
      - name: Persist deterministic integrity outputs
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add REPOSITORY_FILE_MANIFEST.json REPOSITORY_FILE_MANIFEST.json.sha256 SHA256SUMS.txt
          if ! git diff --cached --quiet; then
            git commit -m "ci: materialize proof persistence integrity"
            git push origin HEAD:agent/proof-persistence-batch05
          fi
