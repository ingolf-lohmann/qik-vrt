name: QIKVRT Seed Registry Acceptance

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

defaults:
  run:
    shell: sh

jobs:
  seed-registry-acceptance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout seed repository
        uses: actions/checkout@v4
      - name: Run autonomous seed registry acceptance
        run: sh tools/qikvrt_seed_registry_acceptance.sh
      - name: Persist seed acceptance outputs
        run: |
          git config user.name "qikvrt-actions"
          git config user.email "qikvrt-actions@users.noreply.github.com"
          git add registry evidence ledger || true
          if git diff --cached --quiet; then
            echo "QIKVRT_SEED_ACCEPTANCE_COMMIT no_changes"
          else
            git commit -m "QIKVRT autonomous seed registry acceptance"
            git push
          fi
