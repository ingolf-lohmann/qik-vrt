name: QIKVRT Seed Node Revalidation

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Optional safe QIKVRT run id
        required: false
        type: string
  schedule:
    - cron: '52 */6 * * *'

permissions:
  contents: read

concurrency:
  group: qikvrt-seed-node-revalidation
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      QIKVRT_RUN_ID: ${{ inputs.run_id || format('{0}-{1}', github.run_id, github.run_attempt) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Refresh source state and revalidate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .qikvrt/seed-workflow
          {
            sh tools/qikvrt_seed_mesh_maintenance.sh
            sh tools/qikvrt_seed_node_revalidation.sh
          } 2>&1 | tee .qikvrt/seed-workflow/node-revalidation.log
      - name: Preserve local evidence without mutating the repository
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-seed-revalidation-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 30
          path: |
            .qikvrt/seed-workflow/node-revalidation.log
            registry/NODEMESH_INDEX.json
            registry/NODEMESH_STATUS.json
            registry/NODEMESH_REVALIDATION.json
            evidence/seed_mesh_maintenance/LATEST.json
            evidence/seed_mesh_maintenance/runs/${{ env.QIKVRT_RUN_ID }}.json
            evidence/seed_node_revalidation/LATEST.json
            evidence/seed_node_revalidation/runs/${{ env.QIKVRT_RUN_ID }}.json
