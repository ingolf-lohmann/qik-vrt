name: QIK-VRT formalization and audio tooling

on:
  push:
    paths:
      - "formalization/QIKVRT_Formalization_v1.0/**"
      - "tools/offline-audio-transcription/**"
      - "runtime/toolchains/**"
      - "runtime/CACHE_POLICY.md"
      - "tools/bootstrap-gh.sh"
      - "tools/bootstrap-gh.ps1"
      - "tools/bootstrap-runtime.sh"
      - "tools/bootstrap-runtime.ps1"
      - "tools/qikvrt_tool_cache.py"
      - "tests/test_runtime_bootstrap.sh"
      - ".github/workflows/qikvrt_formalization_and_audio.yml"
  pull_request:
    paths:
      - "formalization/QIKVRT_Formalization_v1.0/**"
      - "tools/offline-audio-transcription/**"
      - "runtime/toolchains/**"
      - "runtime/CACHE_POLICY.md"
      - "tools/bootstrap-gh.sh"
      - "tools/bootstrap-gh.ps1"
      - "tools/bootstrap-runtime.sh"
      - "tools/bootstrap-runtime.ps1"
      - "tools/qikvrt_tool_cache.py"
      - "tests/test_runtime_bootstrap.sh"
      - ".github/workflows/qikvrt_formalization_and_audio.yml"
  workflow_dispatch:
  schedule:
    - cron: "43 03 * * 1"

permissions:
  contents: read

concurrency:
  group: qikvrt-formal-audio-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  runtime-cache-contract:
    name: Materialize complete cumulative runtime cache
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out reviewed repository runtime
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Bind exact Python toolcache and pip content cache
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12.13"
          architecture: x64
          cache: pip
          cache-dependency-path: |
            formalization/QIKVRT_Formalization_v1.0/requirements-dev.txt
            runtime/toolchains/requirements-xml2rfc-3.34.0.txt

      - name: Bind Node 24 toolcache and npm content cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            formalization/QIKVRT_Formalization_v1.0/package-lock.json
            tools/offline-audio-transcription/package-lock.json

      - name: Validate complete declared-tool cache coverage
        run: python3 tools/qikvrt_tool_cache.py verify

      - name: Restore verified GitHub CLI and XML wheelhouse cache
        id: ietf-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            .qikvrt/toolchains/gh
            .qikvrt/toolchains/xml2rfc/3.34.0/python-3.12.13/*/wheelhouse
          key: qikvrt-runtime-v7-ietf-py-3.12.13-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('runtime/toolchains/**', 'tools/bootstrap-gh.sh', 'tools/bootstrap-gh.ps1', 'tools/bootstrap-runtime.sh', 'tools/bootstrap-runtime.ps1', 'tools/qikvrt_tool_cache.py') }}
          enableCrossOsArchive: false

      - name: Materialize and verify GitHub CLI and XML renderer
        run: sh tools/bootstrap-runtime.sh --install --accept-third-party --profile ietf

      - name: Restore exact Lean, Elan and Lake cache
        id: lean-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.elan
            formalization/QIKVRT_Formalization_v1.0/.lake/packages
            formalization/QIKVRT_Formalization_v1.0/.lake/build
          key: qikvrt-lean-v5-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('formalization/QIKVRT_Formalization_v1.0/lean-toolchain', 'formalization/QIKVRT_Formalization_v1.0/lakefile.toml', 'formalization/QIKVRT_Formalization_v1.0/lake-manifest.json', 'formalization/QIKVRT_Formalization_v1.0/**/*.lean') }}
          enableCrossOsArchive: false

      - name: Materialize exact Lean 4.19.0
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          lake-package-directory: formalization/QIKVRT_Formalization_v1.0
          test: false

      - name: Materialize formal Python and npm tools from reviewed locks
        run: |
          set -euo pipefail
          python -m pip install -r formalization/QIKVRT_Formalization_v1.0/requirements-dev.txt
          npm ci --prefix formalization/QIKVRT_Formalization_v1.0 --prefer-offline
          npm ci --prefix tools/offline-audio-transcription --prefer-offline
          python -c 'import importlib.metadata as m; assert m.version("pytest") == "9.1.1"'
          node -e 'const p=require("./formalization/QIKVRT_Formalization_v1.0/node_modules/zod/package.json"); if(p.version!=="4.1.12") process.exit(1)'
          node -e 'const p=require("./tools/offline-audio-transcription/node_modules/sherpa-onnx-node/package.json"); if(p.version!=="1.13.4") process.exit(1)'

      - name: Resolve exact Ubuntu package generation
        id: apt-generation
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          versions="$RUNNER_TEMP/qikvrt-apt-versions.tsv"
          : > "$versions"
          for package in build-essential ffmpeg poppler-utils texlive-xetex
          do
            candidate="$(apt-cache policy "$package" | awk '/Candidate:/ {print $2; exit}')"
            test -n "$candidate"
            test "$candidate" != "(none)"
            printf '%s\t%s\n' "$package" "$candidate" >> "$versions"
          done
          digest="$(sha256sum "$versions" | awk '{print $1}')"
          printf 'digest=%s\n' "$digest" >> "$GITHUB_OUTPUT"
          cat "$versions"

      - name: Restore exact Ubuntu package archive cache
        id: apt-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .qikvrt/toolchains/apt/ubuntu-24.04-amd64
          key: qikvrt-apt-v3-${{ runner.os }}-${{ runner.arch }}-${{ steps.apt-generation.outputs.digest }}-${{ hashFiles('runtime/toolchains/TOOLCHAIN.lock.tsv', 'runtime/toolchains/CACHE_REGISTRY.json', '.github/workflows/qikvrt_formalization_and_audio.yml') }}
          enableCrossOsArchive: false

      - name: Materialize and verify cached Ubuntu system tools
        run: |
          set -euo pipefail
          cache_root="$GITHUB_WORKSPACE/.qikvrt/toolchains/apt/ubuntu-24.04-amd64"
          archives="$cache_root/archives"
          mkdir -p "$archives/partial"
          chmod 0777 "$archives" "$archives/partial"
          sudo DEBIAN_FRONTEND=noninteractive apt-get \
            -o Dir::Cache::archives="$archives/" \
            --download-only --reinstall -y --no-install-recommends install \
            build-essential ffmpeg poppler-utils texlive-xetex
          sudo DEBIAN_FRONTEND=noninteractive apt-get \
            -o Dir::Cache::archives="$archives/" \
            --reinstall -y --no-install-recommends install \
            build-essential ffmpeg poppler-utils texlive-xetex
          find "$archives" -maxdepth 1 -type f -name '*.deb' -print0 |
            sort -z | xargs -0 -r sha256sum > "$cache_root/SHA256SUMS.txt"
          test -s "$cache_root/SHA256SUMS.txt"
          printf '%s\n' 'int main(void) { return 0; }' |
            cc -std=c90 -pedantic -Wall -Wextra -Werror -x c -fsyntax-only -
          ffmpeg_version="$(ffmpeg -version | awk 'NR == 1 {print $3}')"
          ffprobe_version="$(ffprobe -version | awk 'NR == 1 {print $3}')"
          test -n "$ffmpeg_version"
          test "$ffmpeg_version" = "$ffprobe_version"
          xelatex --version | sed -n '1p'
          pdftotext -v 2>&1 | sed -n '1p'
          pdftoppm -v 2>&1 | sed -n '1p'

      - name: Execute all cached-tool self-tests
        run: |
          set -euo pipefail
          (cd formalization/QIKVRT_Formalization_v1.0 && lake build)
          lean --version | grep 'version 4\.19\.0'
          lake --version
          python --version | grep '3\.12\.13'
          node -e 'process.exit(process.versions.node.startsWith("24.") ? 0 : 1)'
          python -m pytest --version | grep '9\.1\.1'
          gh_path="$(sh tools/bootstrap-gh.sh --check-only --print-path)"
          "$gh_path" --version | sed -n '1p'
          renderer=".qikvrt/toolchains/xml2rfc/3.34.0/python-3.12.13/linux-amd64/venv/bin/xml2rfc"
          "$renderer" --version | grep '^xml2rfc 3\.34\.0$'
          renderer_python="$(dirname "$renderer")/python"
          "$renderer_python" -c 'import importlib.metadata as m; assert m.version("pypdf") == "6.10.0"'
          npm test --prefix tools/offline-audio-transcription

      - name: Persist runtime-tool-cache receipt and progress frame
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          IETF_CACHE_HIT: ${{ steps.ietf-cache.outputs.cache-hit }}
          LEAN_CACHE_HIT: ${{ steps.lean-cache.outputs.cache-hit }}
          APT_CACHE_HIT: ${{ steps.apt-cache.outputs.cache-hit }}
        run: |
          set -euo pipefail
          mkdir -p .qikvrt/evidence
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import platform
          import subprocess
          import time
          from pathlib import Path

          def first(*cmd):
              return subprocess.check_output(
                  cmd, text=True, stderr=subprocess.STDOUT
              ).splitlines()[0]

          coverage_path = Path("runtime/toolchains/CACHE_COVERAGE.json")
          receipt = {
              "schema": "qikvrt_runtime_tool_cache_receipt_v1",
              "status": "PASS" if os.environ.get("JOB_STATUS") == "success" else "BLOCK",
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "ref_name": os.environ.get("GITHUB_REF_NAME", ""),
              "source_sha": os.environ.get("GITHUB_SHA", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "recorded_unix": int(time.time()),
              "runner": {
                  "os": platform.system(),
                  "machine": platform.machine(),
              },
              "coverage_sha256": hashlib.sha256(coverage_path.read_bytes()).hexdigest(),
              "cache_hits": {
                  "ietf": os.environ.get("IETF_CACHE_HIT", ""),
                  "lean": os.environ.get("LEAN_CACHE_HIT", ""),
                  "apt": os.environ.get("APT_CACHE_HIT", ""),
              },
              "versions": {
                  "python": platform.python_version(),
                  "node": first("node", "--version"),
                  "lean": first("lean", "--version"),
                  "ffmpeg": first("ffmpeg", "-version"),
                  "xelatex": first("xelatex", "--version"),
                  "poppler": first("pdftotext", "-v"),
              },
          }
          Path(".qikvrt/evidence/runtime_tool_cache_latest.json").write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          completed = 14 if receipt["status"] == "PASS" else 13
          bar = "█" * completed + "░" * (14 - completed)
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as out:
              out.write(
                  f"## QIK-VRT cumulative runtime cache\n\n"
                  f"`[{bar}] {completed * 100 // 14}% ({completed}/14 declared tools)`\n\n"
                  f"- status: `{receipt['status']}`\n"
                  f"- source: `{receipt['source_sha']}`\n"
                  f"- receipt: `.qikvrt/evidence/runtime_tool_cache_latest.json`\n"
              )
          PY

      - name: Upload runtime-tool-cache receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qikvrt-runtime-tool-cache-receipt
          retention-days: 30
          path: .qikvrt/evidence/runtime_tool_cache_latest.json
          if-no-files-found: error

      - name: Save verified GitHub CLI and XML wheelhouse cache
        if: >-
          success() &&
          steps.ietf-cache.outputs.cache-hit != 'true' &&
          (github.event_name == 'workflow_dispatch' ||
           github.event_name == 'schedule' ||
           (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            .qikvrt/toolchains/gh
            .qikvrt/toolchains/xml2rfc/3.34.0/python-3.12.13/*/wheelhouse
          key: qikvrt-runtime-v7-ietf-py-3.12.13-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('runtime/toolchains/**', 'tools/bootstrap-gh.sh', 'tools/bootstrap-gh.ps1', 'tools/bootstrap-runtime.sh', 'tools/bootstrap-runtime.ps1', 'tools/qikvrt_tool_cache.py') }}

      - name: Save verified Lean, Elan and Lake cache
        if: >-
          success() &&
          steps.lean-cache.outputs.cache-hit != 'true' &&
          (github.event_name == 'workflow_dispatch' ||
           github.event_name == 'schedule' ||
           (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.elan
            formalization/QIKVRT_Formalization_v1.0/.lake/packages
            formalization/QIKVRT_Formalization_v1.0/.lake/build
          key: qikvrt-lean-v5-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('formalization/QIKVRT_Formalization_v1.0/lean-toolchain', 'formalization/QIKVRT_Formalization_v1.0/lakefile.toml', 'formalization/QIKVRT_Formalization_v1.0/lake-manifest.json', 'formalization/QIKVRT_Formalization_v1.0/**/*.lean') }}

      - name: Save verified Ubuntu package archive cache
        if: >-
          success() &&
          steps.apt-cache.outputs.cache-hit != 'true' &&
          (github.event_name == 'workflow_dispatch' ||
           github.event_name == 'schedule' ||
           (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .qikvrt/toolchains/apt/ubuntu-24.04-amd64
          key: qikvrt-apt-v3-${{ runner.os }}-${{ runner.arch }}-${{ steps.apt-generation.outputs.digest }}-${{ hashFiles('runtime/toolchains/TOOLCHAIN.lock.tsv', 'runtime/toolchains/CACHE_REGISTRY.json', '.github/workflows/qikvrt_formalization_and_audio.yml') }}

  formal-verification:
    name: Formal verification
    needs: runtime-cache-contract
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: formalization/QIKVRT_Formalization_v1.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Restore exact Lean, Elan and Lake cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.elan
            formalization/QIKVRT_Formalization_v1.0/.lake/packages
            formalization/QIKVRT_Formalization_v1.0/.lake/build
          key: qikvrt-lean-v5-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('formalization/QIKVRT_Formalization_v1.0/lean-toolchain', 'formalization/QIKVRT_Formalization_v1.0/lakefile.toml', 'formalization/QIKVRT_Formalization_v1.0/lake-manifest.json', 'formalization/QIKVRT_Formalization_v1.0/**/*.lean') }}
          enableCrossOsArchive: false
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          lake-package-directory: formalization/QIKVRT_Formalization_v1.0
          test: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: formalization/QIKVRT_Formalization_v1.0/package-lock.json
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12.13"
          cache: pip
          cache-dependency-path: formalization/QIKVRT_Formalization_v1.0/requirements-dev.txt
      - run: npm ci --prefer-offline
      - run: python -m pip install -r requirements-dev.txt
      - run: lake build
      - run: npm run validate
      - run: npm run test:negative
      - run: python -m pytest
      - run: python scripts/build_monolith.py
      - run: lake env lean --json build/All.lean > build/lean.stdout.jsonl
      - run: >-
          python scripts/make_lean_receipt.py
          --checker "Lean 4 native kernel"
          --version "4.19.0"
          --commit "6caaee842e9495688c1567e78c0e68dbb96942aa"
      - run: npm run gate20
      - run: python -m python.gate20

  audio-tool-tests:
    name: Audio tool tests
    needs: runtime-cache-contract
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: tools/offline-audio-transcription
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tools/offline-audio-transcription/package-lock.json
      - run: npm ci --prefer-offline
      - run: npm test
      - run: bash -n bin/transcribe-audio scripts/install-model.sh
