name: Documentation correction
description: Identify an unclear, inconsistent, outdated, or unsupported statement.
title: "[Docs]: "
labels: [documentation]
body:
  - type: input
    id: location
    attributes:
      label: File and section
      placeholder: README.md — Verify
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Current wording and problem
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Proposed correction and supporting evidence
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Evidence boundary
      options:
        - label: I distinguish source, observation, inference, and hypothesis.
          required: true
