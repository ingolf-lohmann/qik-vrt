name: Reproducible software defect
description: Report bounded, reproducible behavior in the active QIK-VRT runtime.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, personal data, or non-public exploit details.
  - type: input
    id: commit
    attributes:
      label: Commit or release
      placeholder: Full commit SHA or release tag
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Minimal reproduction
      description: Include commands and sanitized inputs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed result
    validations:
      required: true
  - type: textarea
    id: effect
    attributes:
      label: Potential downstream effect and risk
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Submission boundary
      options:
        - label: I read CONTRIBUTING.md and understand that submission does not authorize incorporation.
          required: true
