name: Research claim review
description: Review a premise, derivation, counterexample, or evidence boundary.
title: "[Claim review]: "
labels: [research]
body:
  - type: textarea
    id: claim
    attributes:
      label: Exact claim under review
      description: Quote briefly and identify the source location.
    validations:
      required: true
  - type: dropdown
    id: level
    attributes:
      label: Claimed level
      options:
        - Logical or transcendental
        - Formal or mathematical
        - Software or constructive
        - Empirical or physical
        - Historical or legal
        - Personal or spiritual interpretation
    validations:
      required: true
  - type: textarea
    id: analysis
    attributes:
      label: Argument, counterexample, or missing bridge
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Reproducible evidence or primary sources
    validations:
      required: true
  - type: textarea
    id: resolution
    attributes:
      label: Proposed test or resolution criterion
    validations:
      required: true
