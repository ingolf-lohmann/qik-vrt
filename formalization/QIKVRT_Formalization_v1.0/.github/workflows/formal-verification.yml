name: Formal verification

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m pip install -r requirements-dev.txt
      - run: lake build
      - run: npm run validate
      - run: npm run test:negative
      - run: python -m pytest
      - run: python scripts/build_monolith.py
      - run: lake env lean --json build/All.lean > build/lean.stdout.jsonl
      - run: >-
          python scripts/make_lean_receipt.py
          --checker "Lean 4 native kernel"
          --version "4.19.0"
          --commit "6caaee842e9495688c1567e78c0e68dbb96942aa"
      - run: python scripts/generate_checksums.py
      - run: npm run gate20
      - run: python -m python.gate20
