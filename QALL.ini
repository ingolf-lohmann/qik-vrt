; QALL.ini
; Deutsch: Wichtigste anpassbare Parameter für QALL Delivery Bundle.
; English: Most important configurable parameters for the QALL delivery bundle.

[target]
; Deutsch: AUTO_DETECT erkennt Owner/Repo/Branch aus Umgebung, GitHub Actions oder .git/config.
; English: AUTO_DETECT reads owner/repo/branch from environment, GitHub Actions, or .git/config.
; Deutsch: MANUAL nutzt owner/repo/branch unten.
; English: MANUAL uses owner/repo/branch below.
mode = AUTO_DETECT
owner =
repo =
branch = main

[github]
; Deutsch: true = GitHub-Persistenz nach strikter Akzeptanz und Token-Eingabe versuchen.
; English: true = try GitHub persistence after strict acceptance and token input.
; Deutsch: false = nur lokale Reproduktion erzeugen.
; English: false = create local reproduction only.
persist = true
token_prompt = true

[paths]
; Deutsch: Sichtbares Log-/Ergebnisverzeichnis.
; English: Visible log/result directory.
logs = LOGS
; Deutsch: Payload-Verzeichnis.
; English: Payload directory.
payload = _payload
; Deutsch: Interne technische Details liegen als Subset im Payload.
; English: Internal technical details are a subset of the payload.
internal = _payload/_internal
repo_zip = _payload/REPO.zip

[licensing]
; Deutsch: Urheber / Rechteinhaber.
; English: Author / rights holder.
author = Ingolf Lohmann
rights_holder = Ingolf Lohmann
content_license = CC-BY-NC-ND-4.0
software_license = Apache-2.0
preserve_license_notices = true

[delivery]
; Deutsch: Direkte Startdateien.
; English: Direct start files.
root_scripts = WINDOWS.bat, LINUX.sh, MACOS.command
readme_required = true
ini_required = true
hide_internal_details = true

[acceptance_strict]
; Deutsch: Nur diese exakte Phrase wird akzeptiert.
; English: Only this exact phrase is accepted.
required = true
strict_exact_phrase = ICH AKZEPTIERE
ambiguous_input_policy = BLOCK
applies_to = clone, download, use, merge, repository_persistence
preserve_in_clones = true

[counterparty]
; Deutsch: Muss exakt einer der folgenden Werte sein:
; English: Must be exactly one of the following values:
; NATURAL_PERSON
; ARTIFICIAL_COGNITIVE_SYSTEM
; LEGAL_PERSON
; ORGANIZATION
; OTHER
type = NATURAL_PERSON
strict_counterparty_type = true
ambiguous_counterparty_type_policy = BLOCK

[counterparty_other]
; Deutsch: Nur erforderlich, wenn [counterparty] type = OTHER.
; English: Required only if [counterparty] type = OTHER.
; Deutsch: Muss nichtleer und eindeutig sein.
; English: Must be non-empty and unambiguous.
other_description =
other_description_required = true

[reflexive_workflow]
; Deutsch: Nutzer-Findings werden als reflexive Fehlerklassen behandelt.
; English: User findings are treated as reflexive error classes.
enabled = true
user_test_finding_policy = REFLEXIVE_ERROR_CLASS
isolated_hotfix_allowed = false
cross_platform_mirror_required = true
update_policy_map_learn_accept_sync_reports_required = true
deliver_only_on_pass = true

[bilingual_ui]
; Deutsch: Interaktive UI und Nutzerinformationen sind Deutsch/Englisch.
; English: Interactive UI and user information are German/English.
required = true
languages = de,en
blocker_error_class = USER_FACING_TEXT_NOT_BILINGUAL_DE_EN


[bilingual_inheritance]
; Deutsch: Alles Abgeleitete muss die DE/EN-UI-/Nutzerinformationspflicht erben.
; English: All derived artifacts must inherit the DE/EN UI/user-information requirement.
required = true
applies_to = clone,download,fork,template_instance,merge,release,repackage,build_artifact,local_reproduction,github_persistence_output,repository_payload,follow_up_bundle
blocker_error_class = BILINGUAL_UI_INHERITANCE_MISSING


[official_license_refresh]
; Deutsch: Vor jeder Repository-Persistenz offizielle Lizenzdateien neu laden und lokale Kopien überschreiben.
; English: Before every repository persistence, refresh official license files and overwrite local copies.
required_before_repository_persistence = true
apache_2_0_url = https://www.apache.org/licenses/LICENSE-2.0.txt
cc_by_nc_nd_4_0_url = https://creativecommons.org/licenses/by-nc-nd/4.0/legalcode.txt
block_if_refresh_fails = true
overwrite_existing_license_files = true

[file_enrichment]
; Deutsch: Alle Dateien müssen Lizenz-/Urheberrechtsinformationen eingebettet oder manifestiert tragen.
; English: All files must carry embedded or manifest-based license/copyright information.
required_before_repository_persistence = true
source_code_embedded_spdx_required = true
non_source_manifest_coverage_required = true
binary_manifest_coverage_required = true
blocker_error_class = FILE_LICENSE_ENRICHMENT_MISSING


[github_domain_factory]
; Deutsch: Neue GitHub-Repository-Domäne und optional GitHub Pages Custom Domain erzeugen.
; English: Create a new GitHub repository domain and optionally GitHub Pages custom domain.
enabled = true
dry_run_default = true
real_effect_requires_execute = true
script = GITHUB_DOMAIN.py
api_version = 2026-03-10
supports_user_repo = true
supports_org_repo = true
supports_template_repo = true
supports_pages_custom_domain = true
registers_public_dns_domain = false
strict_acceptance_required = true
strict_acceptance_phrase = ICH AKZEPTIERE
counterparty_type_required = true
inheritance_required = true
blocker_error_class = GITHUB_DOMAIN_FACTORY_INHERITANCE_MISSING


[recursive_license_umlaut_layer]
; Deutsch: Sourcecode bleibt ohne deutsche Umlaute; Nicht-Software verwendet deutsche Umlaute korrekt.
; English: Source code stays free of German umlauts; non-software uses German umlauts correctly.
enabled = true
recursive_repository_enrichment_required = true
nested_zip_enrichment_required = true
source_code_no_german_umlauts = true
non_software_correct_german_umlauts = true
blocker_error_class = SOURCE_CODE_UMLAUT_LAYER_AND_RECURSIVE_LICENSE_ENRICHMENT_MISSING


[github_ensure_repository_domain]
; Deutsch: Repository und GitHub-Pages-Custom-Domain pruefen und bei Fehlen anlegen/konfigurieren.
; English: Check repository and GitHub Pages custom domain; create/configure if missing.
enabled = true
dry_run_default = true
execute_required = true
script = GITHUB_ENSURE.py
repository_create_if_missing = true
pages_create_if_missing = true
custom_domain_configure_if_missing = true
strict_acceptance_required = true
counterparty_type_required = true
registers_public_dns_domain = false
blocker_error_class = GITHUB_REPOSITORY_OR_DOMAIN_MISSING_NOT_ENSURED


[script_termination_information_header_guard]
; Deutsch: Jedes Skript meldet Status/Exit-Code/Fehlerdetails; künftige Dateien, Streams und Informationsobjekte erhalten Header oder Manifestabdeckung.
; English: Every script reports status/exit-code/error details; future files, streams, and information objects receive headers or manifest coverage.
enabled = true
script_termination_record_required = true
error_details_required = true
future_output_header_required = true
stream_manifest_required = true
blocker_error_class = SCRIPT_TERMINATION_WITHOUT_STATUS_OR_ERROR_DETAILS


[github_repository_metadata]
; Deutsch: GitHub-Description, Topics, LICENSE und CITATION.cff aktualisieren.
; English: Update GitHub description, topics, LICENSE, and CITATION.cff.
enabled = true
script = GITHUB_METADATA.py
dry_run_default = true
execute_required = true
description_required = true
topics_required = true
citation_required = true
github_license_root_file = LICENSE
software_license = Apache-2.0
non_software_license = CC-BY-NC-ND-4.0
blocker_error_class = GITHUB_REPOSITORY_METADATA_DETAILS_TOPICS_LICENSE_CITATION_MISSING
