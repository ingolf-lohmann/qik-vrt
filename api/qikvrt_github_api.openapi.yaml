openapi: 3.0.3
info:
  title: QIKVRT GitHub Dispatch Adapter API
  version: 2.0.0
  description: >
    The local adapter exposes GitHub-shaped dispatch paths but evaluates the
    request synchronously and returns a QIK-VRT EFFECT_ACK body. GitHub's real
    dispatch API remains asynchronous and normally returns 204; callers must
    subsequently inspect the workflow run and its qikvrt-api-state artifact.
    Technical dispatch acceptance is never ordinary effect permission.
servers:
  - url: http://127.0.0.1:8766
    description: Loopback-only synchronous test/development adapter
  - url: https://api.github.com
    description: GitHub asynchronous REST dispatch API
paths:
  /health:
    get:
      operationId: health
      security: []
      responses:
        '200':
          description: Adapter process is alive and its security configuration is valid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
        '503':
          description: Process responds, but the security configuration is invalid; no request should be dispatched.
  /repos/{owner}/{repo}/actions/workflows/qikvrt_mesh_api.yml/dispatches:
    post:
      operationId: workflowDispatch
      summary: GitHub-shaped workflow_dispatch endpoint.
      parameters:
        - $ref: '#/components/parameters/Owner'
        - $ref: '#/components/parameters/Repo'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [ref, inputs]
              properties:
                ref: { type: string, minLength: 1, maxLength: 255 }
                inputs: { $ref: '#/components/schemas/DispatchInputs' }
      responses:
        '202': { description: Local evaluation reached DONE or CONTINUE; inspect effect_state. }
        '204': { description: GitHub accepted the asynchronous dispatch; no effect result is implied. }
        '400': { description: Invalid request shape, value, or adapter configuration. }
        '401': { description: Missing, invalid, or expired bearer credential. }
        '409': { description: Protective EFFECT_ACK_BLOCK. }
        '422': { description: EFFECT_NACK or malformed request. }
        '423': { description: EFFECT_ACK_ISOLATE due to integrity or replay conflict. }
        '429': { description: Rate limit exceeded. }
        '500': { description: Internal adapter failure; no effect permission is implied. }
  /repos/{owner}/{repo}/dispatches:
    post:
      operationId: repositoryDispatch
      summary: GitHub-shaped repository_dispatch endpoint.
      parameters:
        - $ref: '#/components/parameters/Owner'
        - $ref: '#/components/parameters/Repo'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [event_type, client_payload]
              properties:
                event_type: { type: string, enum: [qikvrt_mesh_api] }
                client_payload: { $ref: '#/components/schemas/DispatchInputs' }
      responses:
        '202': { description: Local evaluation reached DONE or CONTINUE; inspect effect_state. }
        '204': { description: GitHub accepted the asynchronous dispatch; no effect result is implied. }
        '400': { description: Invalid request shape, value, or adapter configuration. }
        '401': { description: Missing, invalid, or expired bearer credential. }
        '409': { description: Protective EFFECT_ACK_BLOCK. }
        '422': { description: EFFECT_NACK or malformed request. }
        '423': { description: EFFECT_ACK_ISOLATE due to integrity or replay conflict. }
        '429': { description: Rate limit exceeded. }
        '500': { description: Internal adapter failure; no effect permission is implied. }
components:
  parameters:
    Owner:
      name: owner
      in: path
      required: true
      schema: { type: string, pattern: '^[A-Za-z0-9_.-]{1,100}$' }
    Repo:
      name: repo
      in: path
      required: true
      schema: { type: string, pattern: '^[A-Za-z0-9_.-]{1,100}$' }
  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, service, tcpip, github_compatible_dispatch, configuration_valid, authentication_configured, remote_attestation_configured]
      properties:
        status: { type: string, enum: [ALIVE, BLOCK] }
        service: { type: string }
        tcpip: { type: boolean }
        github_compatible_dispatch: { type: boolean }
        configuration_valid: { type: boolean }
        authentication_configured: { type: boolean }
        remote_attestation_configured: { type: boolean }
    DispatchInputs:
      type: object
      additionalProperties: false
      required: [operation, artifact_id, dry_run, request_id, effect_accepted]
      properties:
        operation: { type: string, enum: [ingest, verify, stage, release_status] }
        artifact_id: { type: string, pattern: '^[A-Za-z0-9_.=-]{1,128}$' }
        payload_b64: { type: string }
        expected_sha256: { type: string, pattern: '^[0-9a-fA-F]{64}$' }
        dry_run: { oneOf: [{ type: boolean }, { type: string, enum: ['true', 'false'] }] }
        request_id: { type: string, pattern: '^[A-Za-z0-9_.=-]{1,128}$' }
        effect_accepted: { oneOf: [{ type: boolean }, { type: string, enum: ['true', 'false'] }] }
        responsibility_owner: { type: string, minLength: 1, maxLength: 256 }
        state_run_id: { type: string, pattern: '^[0-9]{1,32}$' }
        remote_evidence_b64: { type: string, description: HMAC-authenticated qikvrt_remote_release_attestation_v1 JSON encoded as base64. }
  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      description: Explicitly configured scoped credential with server-side expiry; canonical b64url prefix, unpadded payload, and 32--128 decoded bytes are required by the local adapter.
security:
  - bearerToken: []
